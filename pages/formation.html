<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier Formation — SDIS 31</title>
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --bg: #F4F6F8; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    
    .container { max-width: 1100px; margin: 60px auto 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    
    .fc { --fc-border-color: #EEE; --fc-button-bg-color: #0B1F3A; --fc-button-border-color: #0B1F3A; }
    .fc-event { 
        cursor: pointer; padding: 2px 5px; border: none !important; 
        background-color: var(--navy) !important; color: white !important;
        font-size: 0.75rem !important;
    }
    
    .user-session { position: fixed; top: 15px; right: 15px; z-index: 9999; background: white; padding: 8px 15px; border-radius: 8px; border: 1px solid #DDD; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn-back { position: fixed; top: 15px; left: 15px; z-index: 9999; background: #0B1F3A; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid #E8A020; }

    .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
    .modal-content { background: white; margin: 5% auto; padding: 30px; width: 420px; border-radius: 12px; }
    label { font-size: 0.8rem; font-weight: bold; color: var(--navy); display: block; margin-top: 10px; }
    input { width: 100%; padding: 12px; margin: 5px 0 10px 0; border: 1px solid #DDD; border-radius: 6px; box-sizing: border-box; }
    
    .btn-main { background: var(--navy); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-group { display: flex; gap: 10px; margin-top: 10px; }
    .btn-export { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #DDD; cursor: pointer; font-weight: bold; font-size: 0.75rem; background: #f8f9fa; display: flex; align-items: center; justify-content: center; gap: 5px; }

    /* Style pour la liste des inscrits avec boutons de validation */
    .inscrit-item { display: flex; justify-content: space-between; align-items: center; padding: 5px 0; border-bottom: 1px solid #EEE; margin-bottom: 5px; }
    .btn-valide { background: #2A9D5C; color: white; border: none; padding: 4px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
  </style>
</head>
<body>

  <a href="dashboard.html" class="btn-back">🏠 MENU</a>

  <div class="user-session">
      <span style="font-size: 0.7rem; font-weight: bold; color: #888;">AGENT :</span>
      <select id="selectAgentSession" style="width: 150px; border:none; font-weight: bold; color: var(--navy);"></select>
  </div>

  <div class="container">
    <div id='calendar'></div>
  </div>

  <div id="modalEvent" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle" style="margin-top:0; color: var(--navy);">Session</h2>
      
      <div id="formSection">
          <input type="hidden" id="selectedDate">
          <label>Nom de la formation :</label>
          <input type="text" id="formNom" placeholder="ex: Manœuvre Garonne">
          <label>Lieu :</label>
          <input type="text" id="formLieu" placeholder="ex: Cale de mise à l'eau">
          <button class="btn-main" id="btnSave" style="background: var(--amber); color: var(--navy);">ENREGISTRER</button>
      </div>
      
      <div id="detailSection" style="display:none;">
          <p id="detLieu" style="font-weight: bold; margin-bottom: 10px;"></p>
          <hr style="border: 0; border-top: 1px solid #EEE; margin: 15px 0;">
          <strong>Inscrits :</strong>
          <div id="detInscrits" style="margin: 10px 0; font-size: 0.85rem; background: #F8F9FA; padding: 10px; border-radius: 6px; max-height: 200px; overflow-y: auto;"></div>
          
          <button class="btn-main" id="btnInscrire" style="background: #2A9D5C;">M'INSCRIRE</button>
          <button class="btn-main" id="btnDesinscrire" style="background: #D94040; display:none;">SE DÉSISTER</button>
          
          <div class="btn-group">
            <button class="btn-export" id="btnPDF">📄 PDF ÉMARGEMENT</button>
            <button class="btn-export" id="btnExcel">📊
