<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier Formation — SDIS 31</title>
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --bg: #F4F6F8; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    
    .container { max-width: 1100px; margin: 60px auto 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    
    /* Style du calendrier */
    .fc-header-toolbar { padding: 10px; }
    .fc-event { cursor: pointer; padding: 3px; border: none !important; }
    .event-sal { background-color: var(--navy) !important; }
    .event-sav { background-color: var(--amber) !important; color: var(--navy) !important; }
    
    /* Sélecteur d'agent en haut */
    .user-session { position: fixed; top: 15px; right: 15px; z-index: 9999; background: white; padding: 8px 15px; border-radius: 8px; border: 1px solid #DDD; display: flex; align-items: center; gap: 10px; }
    
    /* Modal */
    .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
    .modal-content { background: white; margin: 10% auto; padding: 30px; width: 400px; border-radius: 12px; }
    input, select { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #DDD; border-radius: 6px; box-sizing: border-box; }
    .btn-main { background: var(--navy); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
  </style>
</head>
<body>

  <a href="dashboard.html" style="position: fixed; top: 15px; left: 15px; z-index: 9999; background: #0B1F3A; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid #E8A020;">🏠 MENU</a>

  <div class="user-session">
      <span style="font-size: 0.8rem; font-weight: bold;">Agent :</span>
      <select id="selectAgentSession" style="width: 150px; margin:0; padding:5px; border:none;"></select>
  </div>

  <div class="container">
    <div id='calendar'></div>
  </div>

  <div id="modalEvent" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle">Nouvelle Session</h2>
      <div id="formSection">
          <input type="hidden" id="selectedDate">
          <label>Type de formation :</label>
          <select id="formType">
              <option value="Entraînement SAL">Entraînement SAL</option>
              <option value="SAV-SEV">SAV-SEV</option>
              <option value="CEN">CEN</option>
              <option value="Recyclage">Recyclage</option>
          </select>
          <label>Lieu :</label>
          <input type="text" id="formLieu" placeholder="ex: Garonne / Pont Neuf">
          <button class="btn-main" id="btnSave">ENREGISTRER</button>
      </div>
      
      <div id="detailSection" style="display:none;">
          <p id="detLieu"></p>
          <hr>
          <strong>Inscrits :</strong>
          <div id="detInscrits" style="margin: 10px 0; font-size: 0.9rem;"></div>
          <button class="btn-main" id="btnInscrire" style="background: #2A9D5C;">M'INSCRIRE</button>
          <button class="btn-main" id="btnDesinscrire" style="background: #D94040; display:none;">SE DÉSISTER</button>
          <button class="btn-main" id="btnSuppr" style="background: #666; margin-top: 20px;">Supprimer la session</button>
      </div>
      
      <button onclick="fermerModal()" style="width:100%; background:none; border:none; color:gray; cursor:pointer; margin-top:15px;">Fermer</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔴 RECOPIE TES CLÉS ICI
    const firebaseConfig = {
      apiKey: "TON_API_KEY",
      authDomain: "TON_PROJET.firebaseapp.com",
      projectId: "TON_PROJET_ID",
      storageBucket: "TON_PROJET.appspot.com",
      appId: "TON_APP_ID"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let agentConnecte = "";
    let calendar;

    // INITIALISATION
    async function init() {
        // Charger agents
        const uSnap = await getDocs(collection(db, "users"));
        const sel = document.getElementById('selectAgentSession');
        sel.innerHTML = '<option value="">-- Choisir --</option>';
        uSnap.forEach(d => { sel.innerHTML += `<option value="${d.data().nom}">${d.data().nom}</option>`; });
        sel.onchange = (e) => { agentConnecte = e.target.value; calendar.refetchEvents(); };

        // Charger Calendrier
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'fr',
            firstDay: 1,
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,timeGridWeek' },
            events: async (info, success, failure) => {
                const snap = await getDocs(collection(db, "formations"));
                const evts = [];
                snap.forEach(d => {
                    const data = d.data();
                    evts.push({
                        id: d.id,
                        title: `${data.type} (${data.inscrits.length})`,
                        start: data.date,
                        extendedProps: { ...data },
                        className: data.type.includes('SAL') ? 'event-sal' : 'event-sav'
                    });
                });
                success(evts);
            },
            dateClick: (info) => ouvrirAjout(info.dateStr),
            eventClick: (info) => ouvrirDetails(info.event)
        });
        calendar.render();
    }

    // ACTIONS MODAL
    window.fermerModal = () => document.getElementById('modalEvent').style.display = 'none';

    function ouvrirAjout(date) {
        document.getElementById('modalTitle').innerText = "Ajouter une session";
        document.getElementById('formSection').style.display = "block";
        document.getElementById('detailSection').style.display = "none";
        document.getElementById('selectedDate').value = date;
        document.getElementById('modalEvent').style.display = 'block';
    }

    async function ouvrirDetails(event) {
        const data = event.extendedProps;
        const id = event.id;
        document.getElementById('modalTitle').innerText = data.type;
        document.getElementById('formSection').style.display = "none";
        document.getElementById('detailSection').style.display = "block";
        document.getElementById('detLieu').innerText = "📍 Lieu : " + data.lieu;
        document.getElementById('detInscrits').innerText = data.inscrits.length > 0 ? data.inscrits.join(', ') : "Aucun inscrit";
        
        const estInscrit = data.inscrits.includes(agentConnecte);
        document.getElementById('btnInscrire').style.display = estInscrit ? "none" : "block";
        document.getElementById('btnDesinscrire').style.display = estInscrit ? "block" : "none";

        document.getElementById('btnInscrire').onclick = () => inscrire(id, data.inscrits);
        document.getElementById('btnDesinscrire').onclick = () => desinscrire(id, data.inscrits);
        document.getElementById('btnSuppr').onclick = () => supprimer(id);
        document.getElementById('modalEvent').style.display = 'block';
    }

    // FIREBASE ACTIONS
    document.getElementById('btnSave').onclick = async () => {
        const type = document.getElementById('formType').value;
        const lieu = document.getElementById('formLieu').value;
        const date = document.getElementById('selectedDate').value;
        if(!lieu) return alert("Indiquez un lieu");
        await addDoc(collection(db, "formations"), { type, lieu, date, inscrits: [] });
        fermerModal();
        calendar.refetchEvents();
    };

    async function inscrire(id, list) {
        if(!agentConnecte) return alert("Sélectionnez votre nom en haut à droite");
        await updateDoc(doc(db, "formations", id), { inscrits: arrayUnion(agentConnecte) });
        fermerModal(); calendar.refetchEvents();
    }

    async function desinscrire(id, list) {
        await updateDoc(doc(db, "formations", id), { inscrits: arrayRemove(agentConnecte) });
        fermerModal(); calendar.refetchEvents();
    }

    async function supprimer(id) {
        if(confirm("Supprimer cette session ?")) {
            await deleteDoc(doc(db, "formations", id));
            fermerModal(); calendar.refetchEvents();
        }
    }

    init();
  </script>
</body>
</html>
