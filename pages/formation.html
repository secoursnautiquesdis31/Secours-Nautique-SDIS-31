<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier Formation — SDIS 31</title>
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --bg: #F4F6F8; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: 60px auto 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); min-height: 500px; }
    .fc { --fc-border-color: #EEE; --fc-button-bg-color: #0B1F3A; --fc-button-border-color: #0B1F3A; }
    
    .fc-event { 
        cursor: pointer; 
        padding: 2px 5px; 
        color: white !important; 
        font-size: 0.75rem !important; 
        border: none !important; 
    }

    .event-wrapper {
        display: flex;
        justify-content: flex-start;
        align-items: center;
        gap: 8px;
        width: 100%;
        overflow: hidden;
    }

    .fc-event-title-custom {
        font-weight: bold;
        white-space: nowrap;
    }

    .fc-event-location-custom {
        font-weight: normal;
        opacity: 0.9;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
    }
    
    .user-session { position: fixed; top: 15px; right: 15px; z-index: 9999; background: white; padding: 8px 15px; border-radius: 8px; border: 1px solid #DDD; display: flex; align-items: center; gap: 10px; }
    .btn-back { position: fixed; top: 15px; left: 15px; z-index: 9999; background: #0B1F3A; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; border: 2px solid #E8A020; font-weight: bold; }
    .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
    .modal-content { background: white; margin: 5% auto; padding: 30px; width: 420px; border-radius: 12px; position: relative; }
    .btn-main { background: var(--navy); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .admin-row { display: flex; justify-content: space-between; align-items: center; padding: 8px; background: #f8f9fa; margin-bottom: 5px; border-radius: 4px; border-left: 4px solid #0B1F3A; }
    
    /* Styles boutons Admin */
    .btn-action-group { display: flex; gap: 5px; }
    .btn-admin-v { background: #2A9D5C; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.65rem; font-weight: bold; }
    .btn-admin-a { background: #D94040; color: white; border: none; padding: 5px 8px; border-radius: 4px; cursor: pointer; font-size: 0.65rem; font-weight: bold; }
    
    select, input { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #CCC; border-radius: 4px; box-sizing: border-box; font-family: 'Barlow'; }
  </style>
</head>
<body>

  <a href="dashboard.html" class="btn-back">🏠 MENU</a>

  <div class="user-session">
      <span style="font-size: 0.7rem; font-weight: bold;">AGENT :</span>
      <select id="selectAgentSession" style="border:none; font-weight: bold; color: var(--navy);"></select>
  </div>

  <div class="container">
    <div id='calendar'></div>
  </div>

  <div id="modalEvent" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle" style="color: var(--navy); margin-top: 0;">Session</h2>
      
      <div id="formSection" style="display:none;">
          <input type="hidden" id="selectedDate">
          <label style="font-size: 0.8rem; font-weight: bold;">Intitulé :</label>
          <select id="formNom">
              <option value="">-- Sélectionner --</option>
              <option value="MSO">MSO</option>
              <option value="FMPA SAV SEV">FMPA SAV SEV</option>
              <option value="FMPA Mer">FMPA Mer</option>
              <option value="FI CEN">FI CEN</option>
              <option value="FI SAV SEV">FI SAV SEV</option>
              <option value="FI MSN">FI MSN</option>
              <option value="Entrainement">Entrainement</option>
              <option value="AUTRE">AUTRE (Saisie manuelle)</option>
          </select>
          <input type="text" id="formNomManuel" placeholder="Nom de la formation" style="display:none;">
          <label style="display:block; font-size: 0.8rem; font-weight: bold; margin-bottom: 5px;">Date de fin :</label>
          <input type="date" id="formDateFin">
          <input type="text" id="formLieu" placeholder="Lieu">
          <button class="btn-main" id="btnSave" style="background: var(--amber); color: var(--navy);">CRÉER LA SESSION</button>
      </div>
      
      <div id="detailSection" style="display:none;">
          <p id="detDates" style="font-size: 0.85rem; color: #666; font-style: italic;"></p>
          <p id="detLieu"></p>
          <hr>
          <strong>Liste des inscrits :</strong>
          <div id="detInscrits" style="margin: 15px 0; max-height: 200px; overflow-y: auto;"></div>
          <button class="btn-main" id="btnInscrire" style="background: #2A9D5C;">M'INSCRIRE</button>
          <button class="btn-main" id="btnSuppr" style="background: #eee; color: #666; font-size: 0.7rem;">Supprimer la session</button>
      </div>
      
      <button id="btnFermerManual" style="width:100%; margin-top:20px; background:none; border:none; color:gray; cursor:pointer;">Fermer</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
        authDomain: "secours-nautique-31.firebaseapp.com",
        projectId: "secours-nautique-31",
        storageBucket: "secours-nautique-31.firebasestorage.app",
        messagingSenderId: "1013387329575",
        appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let calendar;
    let agentConnecte = "";

    const fermerModal = () => { document.getElementById('modalEvent').style.display = 'none'; };
    document.getElementById('btnFermerManual').onclick = fermerModal;

    document.getElementById('formNom').onchange = function() {
        document.getElementById('formNomManuel').style.display = (this.value === "AUTRE") ? "block" : "none";
    };

    // --- NOUVELLE FONCTION DE STATUT (REMPLACE VALIDERAGENT) ---
    window.modifierStatut = async (formationId, nomAgent, nouveauStatut) => {
        if(!confirm(`Confirmer le statut "${nouveauStatut.toUpperCase()}" pour ${nomAgent} ?`)) return;
        
        const ref = doc(db, "formations", formationId);
        const snap = await getDoc(ref);
        const fData = snap.data();
        
        let inscrits = fData.inscrits || [];
        inscrits = inscrits.map(i => {
            let n = (typeof i === 'object') ? i.nom : i;
            if (n === nomAgent) {
                return { nom: n, statut: nouveauStatut, type: fData.nom };
            }
            return i;
        });

        await updateDoc(ref, { inscrits: inscrits });
        alert("Statut mis à jour !");
        calendar.refetchEvents();
        fermerModal();
    };

    async function init() {
        const uSnap = await getDocs(collection(db, "users"));
        const sel = document.getElementById('selectAgentSession');
        sel.innerHTML = '<option value="">-- Agent --</option>';
        uSnap.forEach(d => { sel.innerHTML += `<option value="${d.data().nom}">${d.data().nom}</option>`; });
        sel.onchange = (e) => { agentConnecte = e.target.value; calendar.refetchEvents(); };

        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'multiMonthYear',
            locale: 'fr',
            firstDay: 1,
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,multiMonthYear' },
            events: async (info, success) => {
                const snap = await getDocs(collection(db, "formations"));
                success(snap.docs.map(d => {
                    const data = d.data();
                    let eventColor = "#0B1F3A"; 
                    let txtColor = "white";
                    const nomMaj = data.nom.toUpperCase();

                    if (nomMaj.includes("MSO")) { eventColor = "#E2725B"; } 
                    else if (nomMaj.includes("FMPA SAV SEV")) { eventColor = "#90EE90"; txtColor = "black"; } 
                    else if (nomMaj.includes("FMPA MER")) { eventColor = "#87CEFA"; txtColor = "black"; } 
                    else if (nomMaj.includes("ENTRAINEMENT")) { eventColor = "#FFD700"; txtColor = "black"; }
                    
                    let visuelFin = new Date(data.dateFin || data.date);
                    visuelFin.setDate(visuelFin.getDate() + 1);
                    const isoFin = visuelFin.toISOString().split('T')[0];

                    return { 
                        id: d.id, 
                        title: data.nom, 
                        start: data.date, 
                        end: isoFin, 
                        color: eventColor,
                        textColor: txtColor,
                        extendedProps: data 
                    };
                }));
            },
            eventContent: function(arg) {
                let title = arg.event.title;
                let lieu = arg.event.extendedProps.lieu || "";
                let container = document.createElement('div');
                container.className = 'event-wrapper';
                let html = `<span class="fc-event-title-custom">${title}</span>`;
                if (lieu) { html += `<span class="fc-event-location-custom"> — ${lieu}</span>`; }
                container.innerHTML = html;
                return { domNodes: [container] };
            },
            dateClick: (info) => {
                document.getElementById('modalTitle').innerText = "Nouvelle Session";
                document.getElementById('formSection').style.display = "block";
                document.getElementById('detailSection').style.display = "none";
                document.getElementById('formNom').value = "";
                document.getElementById('formNomManuel').style.display = "none";
                document.getElementById('selectedDate').value = info.dateStr;
                document.getElementById('formDateFin').value = info.dateStr;
                document.getElementById('modalEvent').style.display = 'block';
            },
            eventClick: (info) => {
                const data = info.event.extendedProps;
                const id = info.event.id;
                document.getElementById('modalTitle').innerText = data.nom;
                document.getElementById('formSection').style.display = "none";
                document.getElementById('detailSection').style.display = "block";
                document.getElementById('detLieu').innerText = "📍 " + (data.lieu || "Non précisé");
                
                const d1 = new Date(data.date).toLocaleDateString('fr-FR');
                const d2 = new Date(data.dateFin || data.date).toLocaleDateString('fr-FR');
                document.getElementById('detDates').innerText = (d1 === d2) ? `Le ${d1}` : `Du ${d1} au ${d2}`;

                const zone = document.getElementById('detInscrits');
                zone.innerHTML = "";
                const inscrits = data.inscrits || [];
                if(inscrits.length === 0) zone.innerHTML = "Aucun inscrit.";
                
                inscrits.forEach(i => {
                    let nom = (typeof i === 'object') ? i.nom : i;
                    let statut = (typeof i === 'object') ? i.statut : "en attente";
                    
                    let ligneHtml = `<div class="admin-row"><span>${nom}</span>`;
                    
                    if (statut === "présent") {
                        ligneHtml += `<b style="color:green; font-size:0.7rem;">PRÉSENT ✅</b>`;
                    } else if (statut === "absent") {
                        ligneHtml += `<b style="color:red; font-size:0.7rem;">ABSENT ❌</b>`;
                    } else {
                        // On affiche les deux boutons si le statut est "en attente" ou inconnu
                        ligneHtml += `
                            <div class="btn-action-group">
                                <button class="btn-admin-v" onclick="modifierStatut('${id}', '${nom}', 'présent')">Présent</button>
                                <button class="btn-admin-a" onclick="modifierStatut('${id}', '${nom}', 'absent')">Absent</button>
                            </div>`;
                    }
                    ligneHtml += `</div>`;
                    zone.innerHTML += ligneHtml;
                });

                const noms = inscrits.map(i => (typeof i === 'object' ? i.nom : i));
                const inscrit = agentConnecte && noms.includes(agentConnecte);
                document.getElementById('btnInscrire').style.display = inscrit ? "none" : "block";

                document.getElementById('btnInscrire').onclick = async () => {
                    if(!agentConnecte) return alert("Sélectionnez un agent");
                    await updateDoc(doc(db, "formations", id), { inscrits: arrayUnion({nom: agentConnecte, statut: "en attente"}) });
                    calendar.refetchEvents(); fermerModal();
                };

                document.getElementById('btnSuppr').onclick = async () => {
                    if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "formations", id)); calendar.refetchEvents(); fermerModal(); }
                };

                document.getElementById('modalEvent').style.display = 'block';
            }
        });
        calendar.render();
    }

    document.getElementById('btnSave').onclick = async () => {
        const sel = document.getElementById('formNom').value;
        const man = document.getElementById('formNomManuel').value;
        const nomFinal = (sel === "AUTRE") ? man : sel;
        const lieu = document.getElementById('formLieu').value;
        const date = document.getElementById('selectedDate').value;
        const dateFin = document.getElementById('formDateFin').value;

        if(nomFinal && lieu) {
            await addDoc(collection(db, "formations"), { 
                nom: nomFinal, 
                lieu, 
                date, 
                dateFin: dateFin || date, 
                inscrits: [] 
            });
            calendar.refetchEvents(); fermerModal();
        } else {
            alert("Veuillez remplir le nom et le lieu.");
        }
    };

    init();
  </script>
</body>
</html>
