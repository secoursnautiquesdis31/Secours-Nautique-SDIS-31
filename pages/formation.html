<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier Formation — SDIS 31</title>
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.28/jspdf.plugin.autotable.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --bg: #F4F6F8; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    
    .container { max-width: 1100px; margin: 60px auto 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    
    .fc { --fc-border-color: #EEE; --fc-button-bg-color: #0B1F3A; --fc-button-border-color: #0B1F3A; }
    .fc-event { 
        cursor: pointer; padding: 2px 5px; border: none !important; 
        background-color: var(--navy) !important; color: white !important;
        font-size: 0.75rem !important;
    }
    
    .user-session { position: fixed; top: 15px; right: 15px; z-index: 9999; background: white; padding: 8px 15px; border-radius: 8px; border: 1px solid #DDD; display: flex; align-items: center; gap: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn-back { position: fixed; top: 15px; left: 15px; z-index: 9999; background: #0B1F3A; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid #E8A020; }

    .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
    .modal-content { background: white; margin: 5% auto; padding: 30px; width: 420px; border-radius: 12px; }
    label { font-size: 0.8rem; font-weight: bold; color: var(--navy); display: block; margin-top: 10px; }
    input { width: 100%; padding: 12px; margin: 5px 0 10px 0; border: 1px solid #DDD; border-radius: 6px; box-sizing: border-box; }
    
    .btn-main { background: var(--navy); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 10px; }
    .btn-group { display: flex; gap: 10px; margin-top: 10px; }
    .btn-export { flex: 1; padding: 10px; border-radius: 6px; border: 1px solid #DDD; cursor: pointer; font-weight: bold; font-size: 0.75rem; background: #f8f9fa; display: flex; align-items: center; justify-content: center; gap: 5px; }
    
    /* Styles pour la validation */
    .admin-validation-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 5px; padding: 5px; border-bottom: 1px solid #eee; }
    .btn-valider { background: #2A9D5C; color: white; border: none; padding: 3px 8px; border-radius: 4px; cursor: pointer; font-size: 0.7rem; }
  </style>
</head>
<body>

  <a href="dashboard.html" class="btn-back">🏠 MENU</a>

  <div class="user-session">
      <span style="font-size: 0.7rem; font-weight: bold; color: #888;">AGENT :</span>
      <select id="selectAgentSession" style="width: 150px; border:none; font-weight: bold; color: var(--navy);"></select>
  </div>

  <div class="container">
    <div id='calendar'></div>
  </div>

  <div id="modalEvent" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle" style="margin-top:0; color: var(--navy);">Session</h2>
      
      <div id="formSection">
          <input type="hidden" id="selectedDate">
          <label>Nom de la formation :</label>
          <input type="text" id="formNom" placeholder="ex: Manœuvre Garonne">
          <label>Lieu :</label>
          <input type="text" id="formLieu" placeholder="ex: Cale de mise à l'eau">
          <button class="btn-main" id="btnSave" style="background: var(--amber); color: var(--navy);">ENREGISTRER</button>
      </div>
      
      <div id="detailSection" style="display:none;">
          <p id="detLieu" style="font-weight: bold; margin-bottom: 10px;"></p>
          <hr style="border: 0; border-top: 1px solid #EEE; margin: 15px 0;">
          <strong>Inscrits :</strong>
          <div id="detInscrits" style="margin: 10px 0; font-size: 0.9rem; background: #F8F9FA; padding: 10px; border-radius: 6px; max-height: 150px; overflow-y: auto;"></div>
          
          <button class="btn-main" id="btnInscrire" style="background: #2A9D5C;">M'INSCRIRE</button>
          <button class="btn-main" id="btnDesinscrire" style="background: #D94040; display:none;">SE DÉSISTER</button>
          
          <div class="btn-group">
            <button class="btn-export" id="btnPDF">📄 PDF ÉMARGEMENT</button>
            <button class="btn-export" id="btnExcel">📊 EXCEL</button>
          </div>

          <button class="btn-main" id="btnSuppr" style="background: none; color: #999; border: 1px solid #EEE; margin-top: 20px; font-size: 0.7rem;">Supprimer la session</button>
      </div>
      
      <button onclick="fermerModal()" style="width:100%; background:none; border:none; color:gray; cursor:pointer; margin-top:15px;">Fermer</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, doc, updateDoc, arrayUnion, arrayRemove, deleteDoc, query, where, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
        authDomain: "secours-nautique-31.firebaseapp.com",
        projectId: "secours-nautique-31",
        storageBucket: "secours-nautique-31.firebasestorage.app",
        messagingSenderId: "1013387329575",
        appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let agentConnecte = "";
    let calendar;

    // Rendre la fonction accessible globalement pour les boutons onclick
    window.validerParAdmin = async (fId, nomAgent) => {
        if(!confirm("Valider la présence de " + nomAgent + " ?")) return;
        try {
            const ref = doc(db, "formations", fId);
            const snap = await getDoc(ref);
            let liste = snap.data().inscrits || [];
            
            // Mise à jour du statut dans le tableau
            liste = liste.map(i => {
                let n = (typeof i === 'object') ? i.nom : i;
                if(n === nomAgent) return { nom: n, statut: "présent" };
                return i;
            });
            
            await updateDoc(ref, { inscrits: liste });
            alert("Présence validée !");
            calendar.refetchEvents();
            fermerModal();
        } catch(e) { alert("Erreur"); }
    };

    async function init() {
        try {
            const uSnap = await getDocs(collection(db, "users"));
            const sel = document.getElementById('selectAgentSession');
            sel.innerHTML = '<option value="">-- Agent --</option>';
            uSnap.forEach(d => { sel.innerHTML += `<option value="${d.data().nom}">${d.data().nom}</option>`; });
            sel.onchange = (e) => { agentConnecte = e.target.value; calendar.refetchEvents(); };

            const calendarEl = document.getElementById('calendar');
            calendar = new FullCalendar.Calendar(calendarEl, {
                initialView: 'dayGridMonth',
                locale: 'fr',
                firstDay: 1,
                headerToolbar: { 
                    left: 'prev,next today', 
                    center: 'title', 
                    right: 'dayGridMonth,multiMonthYear' 
                },
                buttonText: { today: "Aujourd'hui", month: "Mois", year: "Année" },
                events: async (info, success, failure) => {
                    const snap = await getDocs(collection(db, "formations"));
                    const evts = [];
                    snap.forEach(d => {
                        const data = d.data();
                        evts.push({
                            id: d.id,
                            title: `${data.nom} | 📍 ${data.lieu}`,
                            start: data.date,
                            extendedProps: { ...data }
                        });
                    });
                    success(evts);
                },
                dateClick: (info) => {
                    document.getElementById('modalTitle').innerText = "Nouvelle session";
                    document.getElementById('formSection').style.display = "block";
                    document.getElementById('detailSection').style.display = "none";
                    document.getElementById('selectedDate').value = info.dateStr;
                    document.getElementById('modalEvent').style.display = 'block';
                },
                eventClick: (info) => { ouvrirDetails(info.event); }
            });
            calendar.render();
        } catch (e) { console.error(e); }
    }

    function ouvrirDetails(event) {
        const data = event.extendedProps;
        const id = event.id;
        const dateStr = event.startStr;
        const inscrits = data.inscrits || [];

        document.getElementById('modalTitle').innerText = data.nom;
        document.getElementById('formSection').style.display = "none";
        document.getElementById('detailSection').style.display = "block";
        document.getElementById('detLieu').innerText = "📍 Lieu : " + data.lieu;
        
        // Construction de la liste des inscrits avec boutons
        let htmlInscrits = "";
        if(inscrits.length === 0) {
            htmlInscrits = "Aucun inscrit.";
        } else {
            inscrits.forEach(i => {
                let nom = (typeof i === 'object') ? i.nom : i;
                let statut = (typeof i === 'object') ? i.statut : "inscrit";
                let estP = (statut === "présent");
                
                htmlInscrits += `<div class="admin-validation-row">
                    <span>${nom} ${estP ? '✅' : ''}</span>
                    ${!estP ? `<button class="btn-valider" onclick="validerParAdmin('${id}', '${nom}')">Valider</button>` : '<span style="color:green;font-size:0.7rem;">PRÉSENT</span>'}
                </div>`;
            });
        }
        document.getElementById('detInscrits').innerHTML = htmlInscrits;

        // Inscription agent session
        const nomsSeuls = inscrits.map(i => (typeof i === 'object' ? i.nom : i));
        const estInscrit = agentConnecte && nomsSeuls.includes(agentConnecte);
        document.getElementById('btnInscrire').style.display = estInscrit ? "none" : "block";
        document.getElementById('btnDesinscrire').style.display = estInscrit ? "block" : "none";

        document.getElementById('btnPDF').onclick = () => genererPDF(data, inscrits, dateStr);
        document.getElementById('btnExcel').onclick = () => genererExcel(data, inscrits, dateStr);
        document.getElementById('btnInscrire').onclick = () => inscrire(id);
        document.getElementById('btnDesinscrire').onclick = () => desinscrire(id);
        document.getElementById('btnSuppr').onclick = async () => {
            if(confirm("Supprimer cette session ?")) { await deleteDoc(doc(db, "formations", id)); fermerModal(); calendar.refetchEvents(); }
        };
        document.getElementById('modalEvent').style.display = 'block';
    }

    async function inscrire(formationId) {
        if(!agentConnecte) return alert("Sélectionnez votre nom");
        try {
            const ref = doc(db, "formations", formationId);
            await updateDoc(ref, { inscrits: arrayUnion({ nom: agentConnecte, statut: "en attente" }) });
            alert("Inscrit !");
            fermerModal(); calendar.refetchEvents();
        } catch (e) { alert("Erreur"); }
    }

    async function desinscrire(formationId) {
        try {
            const ref = doc(db, "formations", formationId);
            const snap = await getDoc(ref);
            const list = snap.data().inscrits || [];
            const obj = list.find(i => (typeof i === 'object' ? i.nom : i) === agentConnecte);
            await updateDoc(ref, { inscrits: arrayRemove(obj) });
            fermerModal(); calendar.refetchEvents();
        } catch (e) { console.error(e); }
    }

    function genererPDF(data, inscrits, dateStr) {
        const { jsPDF } = window.jspdf;
        const docPDF = new jsPDF();
        docPDF.text("EMARGEMENT : " + data.nom, 14, 20);
        const lignes = inscrits.map((i, idx) => [idx + 1, (typeof i === 'object' ? i.nom : i), ""]);
        docPDF.autoTable({ startY: 30, head: [['#', 'Nom', 'Signature']], body: lignes });
        docPDF.save("Emargement.pdf");
    }

    function genererExcel(data, inscrits, dateStr) {
        const wb = XLSX.utils.book_new();
        const wsData = [["NOM", "STATUT"]];
        inscrits.forEach(i => wsData.push([(typeof i === 'object' ? i.nom : i), (typeof i === 'object' ? i.statut : "inscrit")]));
        XLSX.utils.book_append_sheet(wb, XLSX.
