<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Annuaire RH — SDIS 31 Nautique</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --bg: #F4F6F8; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    .container { max-width: 1100px; margin: 40px auto; background: white; padding: 25px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    
    .rh-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; border-bottom: 3px solid var(--navy); padding-bottom: 10px; }
    .search-bar { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #DDD; font-size: 1rem; margin-bottom: 20px; box-sizing: border-box; }

    /* Style Liste */
    .list-header { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; padding: 12px 20px; background: var(--navy); color: white; border-radius: 8px 8px 0 0; font-weight: bold; font-size: 0.9rem; }
    .agent-row { display: grid; grid-template-columns: 2fr 1fr 1fr 1.5fr; padding: 12px 20px; border-bottom: 1px solid #EEE; align-items: center; transition: 0.2s; }
    .agent-row:hover { background: #F9F9F9; }
    
    .btn-action { padding: 6px 12px; border-radius: 6px; text-decoration: none; font-size: 0.8rem; font-weight: bold; margin-right: 5px; display: inline-block; text-align: center; }
    .btn-fiche { background: var(--navy); color: white; }
    .btn-suppr { background: #f8d7da; color: #721c24; border: none; cursor: pointer; }
  </style>
</head>
<body>

<a href="dashboard.html" style="position: fixed; top: 15px; left: 15px; z-index: 9999; background: var(--navy); color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid var(--amber);">🏠 MENU</a>

<div class="container">
    <div class="rh-header">
        <h1 style="margin:0; color:var(--navy);">Annuaire Nautique</h1>
        <a href="suivi-aptitudes.html" style="background: var(--amber); color: var(--navy); padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold;">📊 TABLEAU APTITUDES</a>
    </div>

    <input type="text" id="searchInput" class="search-bar" placeholder="Rechercher par nom, CIS...">

    <div class="list-header">
        <div>NOM PRÉNOM</div>
        <div>CIS</div>
        <div>TÉLÉPHONE</div>
        <div style="text-align: right;">ACTIONS</div>
    </div>
    <div id="agentsList"></div>
</div>

<script type="module">
  // Sécurité : on s'assure qu'on est en mode admin ici
localStorage.removeItem('modeConsultation');
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
        authDomain: "secours-nautique-31.firebaseapp.com",
        projectId: "secours-nautique-31",
        storageBucket: "secours-nautique-31.firebasestorage.app",
        messagingSenderId: "1013387329575",
        appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    let allAgents = [];

    async function chargerRH() {
        const snap = await getDocs(collection(db, "users"));
        allAgents = [];
        snap.forEach(d => allAgents.push({ id: d.id, ...d.data() }));
        afficher(allAgents);
    }

    function afficher(liste) {
        const cont = document.getElementById('agentsList');
        cont.innerHTML = "";
        liste.sort((a,b) => a.nom.localeCompare(b.nom)).forEach(agent => {
            const row = document.createElement('div');
            row.className = "agent-row";
            row.innerHTML = `
                <div style="font-weight:bold; color:var(--navy);">${agent.nom}</div>
                <div>${agent.cis || '-'}</div>
                <div>${agent.tel || '-'}</div>
                <div style="text-align: right;">
                    <a href="fiche-agent.html?id=${agent.id}" class="btn-action btn-fiche">VOIR FICHE / SPÉ</a>
                    <button class="btn-action btn-suppr" onclick="supprimerAgent('${agent.id}', '${agent.nom}')">🗑️</button>
                </div>
            `;
            cont.appendChild(row);
        });
    }

    document.getElementById('searchInput').oninput = (e) => {
        const v = e.target.value.toLowerCase();
        afficher(allAgents.filter(a => a.nom.toLowerCase().includes(v) || (a.cis && a.cis.toLowerCase().includes(v))));
    };

    window.supprimerAgent = async (id, nom) => {
        if(confirm(`Supprimer définitivement ${nom} ?`)) {
            await deleteDoc(doc(db, "users", id));
            chargerRH();
        }
    };

    chargerRH();
</script>
</body>
</html>
