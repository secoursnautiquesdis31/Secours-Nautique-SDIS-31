<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>RH — Secours Nautique SDIS 31</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .agent-card { background: white; padding: 15px; border-radius: 10px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); border-left: 5px solid #E8A020; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: center; }
    .agent-info h3 { margin: 0; color: #0B1F3A; text-transform: uppercase; font-size: 1.1rem; }
    .agent-info p { margin: 2px 0; font-size: 0.9rem; color: #526070; }
    .badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; background: #E8ECF0; }
    .search-bar { margin-bottom: 20px; padding: 10px; width: 100%; border-radius: 8px; border: 1px solid #C8D2DC; }
  </style>
</head>
<body class="app-layout">
  <div class="page-content">
    <div class="page-header">
      <h1>Annuaire RH - Secours Nautique</h1>
    </div>

    <input type="text" id="search" class="search-bar" placeholder="Rechercher un nom, un CIS...">

    <div id="agentsList">
      <p>Chargement des agents...</p>
    </div>
  </div>

  <script type="module">
    import { db, collection, getDocs } from "./auth.js";

    async function loadRH() {
      const container = document.getElementById('agentsList');
      try {
        const querySnapshot = await getDocs(collection(db, "users"));
        container.innerHTML = "";
        
        if (querySnapshot.empty) {
          container.innerHTML = "<p>Aucun agent trouvé dans la base.</p>";
          return;
        }

        querySnapshot.forEach((doc) => {
          const agent = doc.data();
          const card = document.createElement('div');
          card.className = 'agent-card';
          card.innerHTML = `
            <div class="agent-info">
              <h3>${agent.nom || "Nom inconnu"}</h3>
              <p><strong>Affectation :</strong> ${agent.cis || "Non renseigné"}</p>
              <p><strong>Contact :</strong> ${agent.tel || "NC"}</p>
            </div>
            <div class="agent-status">
              <span class="badge">${agent.role || "Agent"}</span>
            </div>
          `;
          container.appendChild(card);
        });
      } catch (error) {
        console.error("Erreur RH:", error);
        container.innerHTML = "<p>Erreur lors du chargement des données.</p>";
      }
    }

    loadRH();
  </script>
</body>
</html>
