<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Gestion RH — SDIS 31 Nautique</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --bg: #F4F6F8; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 40px auto; }
    
    /* Header & Recherche */
    .rh-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .search-bar { width: 100%; padding: 15px; border-radius: 10px; border: 1px solid #DDD; font-size: 1rem; margin-bottom: 20px; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }

    /* Grille Agents */
    .agents-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
    .agent-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); cursor: pointer; transition: 0.3s; border-left: 5px solid var(--navy); }
    .agent-card:hover { transform: translateY(-5px); box-shadow: 0 8px 20px rgba(0,0,0,0.1); }
    .agent-card h3 { margin: 0 0 5px 0; color: var(--navy); }
    .agent-card p { margin: 2px 0; color: #666; font-size: 0.9rem; }

    /* Modal / Fiche Agent */
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); z-index: 1000; justify-content: center; align-items: center; }
    .modal-content { background: white; width: 90%; max-width: 800px; max-height: 90vh; border-radius: 15px; padding: 30px; overflow-y: auto; position: relative; }
    .close-btn { position: absolute; top: 20px; right: 20px; font-size: 1.5rem; cursor: pointer; }

    .quota-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; background: #f9f9f9; padding: 15px; border-radius: 8px; margin-top: 15px; }
    .quota-item { display: flex; justify-content: space-between; align-items: center; }
    .quota-item input { width: 60px; padding: 5px; text-align: center; border: 1px solid #ddd; border-radius: 4px; }
    
    .btn-save { background: var(--navy); color: white; border: none; padding: 12px 25px; border-radius: 8px; cursor: pointer; font-weight: bold; margin-top: 20px; width: 100%; }
    .btn-save:hover { background: #152e50; }
  </style>
</head>
<body>

<a href="dashboard.html" style="position: fixed; top: 15px; left: 15px; z-index: 9999; background: var(--navy); color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid var(--amber);">🏠 MENU</a>

<div class="container">
    <div class="rh-header">
        <h1>Annuaire du Personnel Nautique</h1>
        <a href="suivi-aptitudes.html" style="background: var(--amber); color: var(--navy); padding: 10px 20px; border-radius: 8px; text-decoration: none; font-weight: bold;">📊 VOIR LES APTITUDES</a>
    </div>

    <input type="text" id="searchInput" class="search-bar" placeholder="Rechercher un nom, un CIS ou une spécialité...">

    <div class="agents-grid" id="agentsGrid">
        </div>
</div>

<div id="agentModal" class="modal">
    <div class="modal-content">
        <span class="close-btn" onclick="closeModal()">×</span>
        <h2 id="modalNom" style="color: var(--navy); margin-bottom: 5px;">---</h2>
        <p id="modalCis" style="color: var(--amber); font-weight: bold; margin-bottom: 20px;">---</p>
        
        <hr>

        <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 30px; margin-top: 20px;">
            <div>
                <h3>Informations Contact</h3>
                <p><strong>Téléphone :</strong> <input type="text" id="editTel" style="width: 100%; padding: 8px; margin-top:5px;"></p>
                <p><strong>Rôle :</strong> <input type="text" id="editRole" style="width: 100%; padding: 8px; margin-top:5px;"></p>
            </div>

            <div>
                <h3>Objectifs Annuels (Quotas)</h3>
                <p style="font-size: 0.8rem; color: #777;">Définit le nombre de jours requis pour être "APTE".</p>
                <div class="quota-grid">
                    <div class="quota-item"><span>SAV/SEV</span> <input type="number" id="qSav"></div>
                    <div class="quota-item"><span>FMPA Mer</span> <input type="number" id="qFmpa"></div>
                    <div class="quota-item"><span>Recycl. CEN</span> <input type="number" id="qCen"></div>
                    <div class="quota-item"><span>MSO / Entr.</span> <input type="number" id="qMso"></div>
                </div>
            </div>
        </div>

        <button class="btn-save" id="btnSave">ENREGISTRER LA FICHE</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
        authDomain: "secours-nautique-31.firebaseapp.com",
        projectId: "secours-nautique-31",
        storageBucket: "secours-nautique-31.firebasestorage.app",
        messagingSenderId: "1013387329575",
        appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    
    let allAgents = [];
    let currentAgentId = null;

    // CHARGEMENT
    async function chargerAgents() {
        const snap = await getDocs(collection(db, "users"));
        allAgents = [];
        snap.forEach(d => allAgents.push({ id: d.id, ...d.data() }));
        afficherAgents(allAgents);
    }

    function afficherAgents(agents) {
        const grid = document.getElementById('agentsGrid');
        grid.innerHTML = "";
        agents.sort((a,b) => a.nom.localeCompare(b.nom)).forEach(agent => {
            const card = document.createElement('div');
            card.className = "agent-card";
            card.onclick = () => openModal(agent);
            card.innerHTML = `
                <h3>${agent.nom}</h3>
                <p><strong>CIS :</strong> ${agent.cis || 'Non renseigné'}</p>
                <p><strong>Tél :</strong> ${agent.tel || '-'}</p>
                <p style="margin-top:10px;"><span style="background:#EEE; padding:3px 8px; border-radius:4px; font-size:0.7rem;">${agent.role || 'Agent'}</span></p>
            `;
            grid.appendChild(card);
        });
    }

    // RECHERCHE
    document.getElementById('searchInput').oninput = (e) => {
        const val = e.target.value.toLowerCase();
        const filtered = allAgents.filter(a => 
            a.nom.toLowerCase().includes(val) || 
            (a.cis && a.cis.toLowerCase().includes(val))
        );
        afficherAgents(filtered);
    };

    // MODAL
    window.openModal = (agent) => {
        currentAgentId = agent.id;
        document.getElementById('modalNom').innerText = agent.nom;
        document.getElementById('modalCis').innerText = agent.cis || "CIS non renseigné";
        document.getElementById('editTel').value = agent.tel || "";
        document.getElementById('editRole').value = agent.role || "Agent";
        
        // Quotas par défaut si inexistants
        const q = agent.quotas || { sav: 1, fmpa: 1, cen: 1, mso: 2 };
        document.getElementById('qSav').value = q.sav;
        document.getElementById('qFmpa').value = q.fmpa;
        document.getElementById('qCen').value = q.cen;
        document.getElementById('qMso').value = q.mso;

        document.getElementById('agentModal').style.display = "flex";
    };

    window.closeModal = () => {
        document.getElementById('agentModal').style.display = "none";
    };

    // SAUVEGARDE
    document.getElementById('btnSave').onclick = async () => {
        if (!currentAgentId) return;

        const updatedData = {
            tel: document.getElementById('editTel').value,
            role: document.getElementById('editRole').value,
            quotas: {
                sav: parseInt(document.getElementById('qSav').value),
                fmpa: parseInt(document.getElementById('qFmpa').value),
                cen: parseInt(document.getElementById('qCen').value),
                mso: parseInt(document.getElementById('qMso').value)
            }
        };

        try {
            await updateDoc(doc(db, "users", currentAgentId), updatedData);
            alert("Fiche agent mise à jour !");
            closeModal();
            chargerAgents();
        } catch (e) {
            alert("Erreur lors de la sauvegarde.");
        }
    };

    chargerAgents();
</script>
</body>
</html>
