<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDIS 31 - Opérationnel</title>
    <link rel="stylesheet" href="style.css"> <style>
        :root { --navy: #1a2a44; --amber: #ffbf00; }
        body { font-family: sans-serif; background-color: #f0f2f5; margin: 0; padding: 20px; }
        .container { max-width: 900px; margin: auto; }
        .fiche-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); border-top: 5px solid var(--navy); }
        .header { background: var(--navy); color: white; padding: 20px; text-align: center; }
        .content { padding: 20px; }
        .form-ajout { background: #f9f9f9; padding: 15px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #ddd; }
        .input-group { margin-bottom: 10px; }
        input { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        button { background: var(--navy); color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; cursor: pointer; font-weight: bold; }
        button:hover { background: #2a3a54; }
        .grille-docs { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 15px; margin-top: 20px; }
        .doc-card { background: white; border: 1px solid #eee; border-radius: 8px; padding: 15px; text-align: center; transition: transform 0.2s; }
        .doc-card:hover { transform: translateY(-5px); border-color: var(--amber); }
        .btn-open { display: block; margin-top: 10px; background: var(--amber); color: var(--navy); text-decoration: none; padding: 8px; border-radius: 4px; font-weight: bold; font-size: 0.9em; }
    </style>
</head>
<body>

<div class="container">
    <div class="fiche-card">
        <div class="header">
            <h1 style="margin:0;">DOCUMENTS OPÉRATIONNELS</h1>
            <small>Secours Nautique 31</small>
        </div>
        
        <div class="content">
            <div class="form-ajout">
                <h3 style="margin-top:0; color: var(--navy);">➕ Ajouter un document PDF</h3>
                <div class="input-group">
                    <input type="text" id="titreDoc" placeholder="Nom du document (ex: Plan d'eau Seilh)">
                </div>
                <div class="input-group">
                    <input type="text" id="urlDoc" placeholder="Lien de partage Google Drive">
                </div>
                <button id="btnEnregistrerDoc">ENREGISTRER DANS LA BIBLIOTHÈQUE</button>
            </div>

            <hr>

            <h3 style="color: var(--navy);">📁 Bibliothèque</h3>
            <div id="grilleDocs" class="grille-docs">
                </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // --- COPIE TA CONFIG FIREBASE ICI ---
    const firebaseConfig = {
        apiKey: "TON_API_KEY",
        authDomain: "secours-nautique-31.firebaseapp.com",
        projectId: "secours-nautique-31",
        storageBucket: "secours-nautique-31.firebasestorage.app",
        messagingSenderId: "...",
        appId: "..."
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Fonction pour sauvegarder
    document.getElementById('btnEnregistrerDoc').onclick = async () => {
        const titre = document.getElementById('titreDoc').value;
        const url = document.getElementById('urlDoc').value;

        if(!titre || !url) return alert("Champs vides !");

        try {
            await addDoc(collection(db, "bibliotheque_ops"), {
                titre: titre,
                url: url,
                date: new Date()
            });
            document.getElementById('titreDoc').value = "";
            document.getElementById('urlDoc').value = "";
            alert("Document ajouté !");
            chargerDocs();
        } catch (e) { alert("Erreur Firestore"); }
    };

    // Fonction pour charger
    async function chargerDocs() {
        const container = document.getElementById('grilleDocs');
        container.innerHTML = "Chargement...";
        
        const q = query(collection(db, "bibliotheque_ops"), orderBy("date", "desc"));
        const snap = await getDocs(q);
        
        container.innerHTML = "";
        snap.forEach(doc => {
            const d = doc.data();
            container.innerHTML += `
                <div class="doc-card">
                    <div style="font-size: 40px; margin-bottom:10px;">📄</div>
                    <div style="font-weight:bold; color:var(--navy); min-height:40px;">${d.titre}</div>
                    <a href="${d.url}" target="_blank" class="btn-open">OUVRIR PDF</a>
                </div>
            `;
        });
    }

    chargerDocs();
</script>

</body>
</html>
