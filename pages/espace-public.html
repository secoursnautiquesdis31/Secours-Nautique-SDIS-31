<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Agent — SDIS 31</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        :root { --navy: #0B1F3A; --amber: #E8A020; --light-bg: #F0F2F5; }
        body { font-family: 'Barlow', sans-serif; background: var(--light-bg); margin: 0; padding: 0; }
        
        .header-agent { background: var(--navy); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--amber); }
        .container { max-width: 600px; margin: 20px auto; padding: 10px; }

        /* Design identique à tes boutons de base */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .menu-btn { background: white; padding: 20px; border-radius: 12px; text-align: center; text-decoration: none; color: var(--navy); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.05); transition: 0.3s; border: 1px solid transparent; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 15px; }
        .menu-btn:active { transform: scale(0.95); background: var(--amber); }

        /* Bouton Retour distinct en haut */
        .btn-retour { background: white; padding: 15px; border-radius: 12px; text-align: center; text-decoration: none; color: var(--navy); font-weight: bold; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 20px; border: 2px solid var(--amber); display: block; }
    </style>
</head>
<body>

    <div class="header-agent">
        <h1 style="margin:0;">DOCUMENTS OPÉRATIONNELS</h1>
        <p style="margin:5px 0 0 0; opacity:0.8;">Consultation des référentiels</p>
    </div>

    <div class="container">
        <a href="javascript:history.back()" class="btn-retour">⬅️ RETOUR À L'ACCUEIL</a>

        <div id="listeDocs" class="menu-grid">
            <p style="text-align:center;">Chargement des fichiers...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
            authDomain: "secours-nautique-31.firebaseapp.com",
            projectId: "secours-nautique-31",
            storageBucket: "secours-nautique-31.firebasestorage.app",
            messagingSenderId: "1013387329575",
            appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function chargerDocs() {
            const liste = document.getElementById('listeDocs');
            try {
                // On récupère uniquement les documents existants
                const q = query(collection(db, "bibliotheque_ops"), orderBy("date", "desc"));
                const snap = await getDocs(q);
                liste.innerHTML = "";

                if (snap.empty) {
                    liste.innerHTML = "<p style='text-align:center;'>Aucun document disponible.</p>";
                    return;
                }

                snap.forEach(doc => {
                    const data = doc.data();
                    // On crée un bouton pour chaque PDF
                    const btn = document.createElement('a');
                    btn.href = data.url;
                    btn.target = "_blank";
                    btn.className = "menu-btn";
                    btn.innerHTML = `📄 <span>${data.titre}</span>`;
                    liste.appendChild(btn);
                });
            } catch (e) {
                console.error(e);
                liste.innerHTML = "<p style='text-align:center;'>Erreur de connexion.</p>";
            }
        }

        chargerDocs();
    </script>
</body>
</html>
