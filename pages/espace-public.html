<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace Agent — SDIS 31</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        :root { --navy: #0B1F3A; --amber: #E8A020; --light-bg: #F0F2F5; }
        body { font-family: sans-serif; background: var(--light-bg); margin: 0; padding: 0; }
        .header-agent { background: var(--navy); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--amber); }
        .container { max-width: 600px; margin: 20px auto; padding: 10px; }
        .id-card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; }
        select, textarea { width: 100%; padding: 12px; border-radius: 8px; border: 2px solid #ddd; margin-top: 10px; font-size: 1rem; box-sizing: border-box; }
        .menu-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .menu-btn { background: white; padding: 20px; border-radius: 12px; text-align: center; text-decoration: none; color: var(--navy); font-weight: bold; cursor: pointer; border:none; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center; }
        .modal-content { background:white; padding:25px; border-radius:15px; width:90%; max-width:400px; }
        .btn-send { background: var(--navy); color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 10px; }
    </style>
</head>
<body>

    <div class="header-agent">
        <h1 style="margin:0;">SECOURS NAUTIQUE 31</h1>
        <p style="margin:5px 0 0 0; opacity:0.8;">Espace Opérationnel & Logistique</p>
    </div>

    <div class="container">
        <div class="id-card">
            <label style="font-weight: bold; color: var(--navy);">QUI ÊTES-VOUS ?</label>
            <select id="selectAgent">
                <option value="">-- Sélectionner mon nom --</option>
            </select>
            <p id="msgBienvenue" style="margin-top:10px; font-weight:bold; color:var(--amber); display:none;"></p>
        </div>

       <div class="menu-grid">
   <button onclick="ouvrirFormation()" class="menu-btn" style="display: block; font-size: 1rem; width:100%; font-family:inherit;">
    📅<br>FORMATION<br>
    <small style="font-weight:normal; opacity:0.7; font-size: 0.75rem;">Calendrier - Inscription</small>
</button>    
    <button class="menu-btn" onclick="ouvrirDemande()" style="font-size: 1rem; width: 100%; font-family: inherit;">
        📦<br>MATÉRIEL<br>
        <small style="font-weight:normal; opacity:0.7; font-size: 0.75rem;">Besoin de matériel</small>
    </button>
    <button onclick="ouvrirMaFiche()" class="menu-btn" style="display: block; font-size: 1rem; width:100%; font-family:inherit;">
    👤<br>MA FICHE<br>
    <small style="font-weight:normal; opacity:0.7; font-size: 0.75rem;">Mes infos - Visite médicale</small>
</button>
           
           <a href="operationnel.html" class="menu-btn" style="grid-column: span 2; display: block; font-size: 1rem;">
        🌊<br>RESSOURCES<br>
        <small style="font-weight:normal; opacity:0.7; font-size: 0.75rem;">Ressources documentaires, Boite a outils, Autres</small>
    </a>
</div>
        
    <div id="modalMatos" class="modal">
        <div class="modal-content">
            <h3 style="margin-top:0; color:var(--navy);">Besoin de matériel</h3>
            <label>Article souhaité :</label>
            <select id="matType"><option value="">Chargement du stock...</option></select>
            <label>Motif / Raison :</label>
            <textarea id="matRaison" rows="3" placeholder="Remplacement, perte..."></textarea>
            <button id="btnEnvoyer" class="btn-send">ENVOYER LA DEMANDE</button>
            <button onclick="document.getElementById('modalMatos').style.display='none'" style="background:none; border:none; width:100%; margin-top:15px; color:#666; cursor:pointer;">Annuler</button>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, addDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
            authDomain: "secours-nautique-31.firebaseapp.com",
            projectId: "secours-nautique-31",
            storageBucket: "secours-nautique-31.firebasestorage.app",
            messagingSenderId: "1013387329575",
            appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        const selectAgent = document.getElementById('selectAgent');
        const selectMat = document.getElementById('matType');

        async function chargerAgents() {
            try {
                const snap = await getDocs(collection(db, "users"));
                snap.forEach(doc => {
                    let opt = document.createElement('option');
                    opt.value = doc.id;
                    opt.text = doc.data().nom;
                    selectAgent.appendChild(opt);
                });
            } catch(e) { console.error(e); }
        }

        async function chargerListeMateriel() {
            try {
                const snap = await getDocs(collection(db, "stocks")); 
                selectMat.innerHTML = '<option value="">-- Choisir un article --</option>';
                snap.forEach(doc => {
                    const item = doc.data();
                    if(item.quantite > 0) {
                        let opt = document.createElement('option');
                        const t = item.taille ? ` (${item.taille})` : "";
                        opt.value = item.type + "##" + (item.taille || "");
                        opt.text = item.type + t; 
                        selectMat.appendChild(opt);
                    }
                });
            } catch(e) { console.error(e); }
        }

        selectAgent.onchange = () => {
            const nom = selectAgent.options[selectAgent.selectedIndex].text;
            if(selectAgent.value !== "") {
                document.getElementById('msgBienvenue').innerText = "Salut " + nom + " !";
                document.getElementById('msgBienvenue').style.display = "block";
            }
        };

        window.ouvrirDemande = () => {
            if(!selectAgent.value) return alert("Sélectionne ton nom d'abord !");
            document.getElementById('modalMatos').style.display = 'flex';
            chargerListeMateriel();
        };

window.ouvrirFormation = () => {
    if(!selectAgent.value) return alert("Sélectionne ton nom d'abord !");
    
    // 1. On récupère le texte du nom (ex: "DUPONT Jean")
    const nomAgent = selectAgent.options[selectAgent.selectedIndex].text;
    
    // 2. On l'enregistre dans le localStorage pour que le calendrier le lise
    localStorage.setItem('agentNomSelected', nomAgent);
    
    // 3. On redirige vers le calendrier
    window.location.href = `calendrier-public.html`;
};
        window.ouvrirMaFiche = () => {
    // 1. On vérifie si un nom est sélectionné
    if(!selectAgent.value) return alert("Sélectionne ton nom d'abord !");
    
    // 2. On récupère le texte du nom (ex: DUPONT Jean)
    const nomAgent = selectAgent.options[selectAgent.selectedIndex].text;
    
    // 3. On l'enregistre pour que la page suivante le reconnaisse
    localStorage.setItem('agentNomSelected', nomAgent);
    
    // 4. On part vers la page fiche (il faudra créer ce fichier après)
    window.location.href = "fiche-agent.html";
};
        document.getElementById('btnEnvoyer').onclick = async () => {
            if(!selectMat.value) return alert("Sélectionne un article.");
            
            const [type, taille] = selectMat.value.split("##");

            try {
                await addDoc(collection(db, "demandes_materiel"), {
                    agentId: selectAgent.value,
                    agentNom: selectAgent.options[selectAgent.selectedIndex].text,
                    type: type,
                    taille: taille,
                    raison: document.getElementById('matRaison').value,
                    date: new Date().toISOString(),
                    statut: "en_attente"
                });
                alert("Demande bien envoyée !");
                document.getElementById('modalMatos').style.display = 'none';
                document.getElementById('matRaison').value = "";
            } catch (e) { 
                alert("Erreur lors de l'envoi : " + e.message); 
            }
        };

        chargerAgents();
    </script>
</body>
</html>
