<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Documents Opérationnels — SDIS 31</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        :root { --navy: #0B1F3A; --amber: #E8A020; --light-bg: #F0F2F5; }
        body { font-family: 'Barlow', sans-serif; background: var(--light-bg); margin: 0; padding: 0; }
        
        /* Header identique à l'espace agent */
        .header-ops { background: var(--navy); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--amber); }
        
        .container { max-width: 600px; margin: 20px auto; padding: 15px; }

        /* Bouton Retour spécial Agents */
        .btn-back { 
            display: inline-block;
            background: white; 
            color: var(--navy); 
            padding: 10px 20px; 
            border-radius: 8px; 
            text-decoration: none; 
            font-weight: bold; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.1);
            margin-bottom: 20px;
            border: 1px solid #ddd;
        }

        /* Liste des documents */
        .doc-list { display: flex; flex-direction: column; gap: 10px; }
        .doc-item { 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center;
            text-decoration: none;
            color: var(--navy);
            box-shadow: 0 2px 5px rgba(0,0,0,0.05);
            transition: 0.2s;
        }
        .doc-item:active { transform: scale(0.98); background: #f0f0f0; }
        .doc-info { display: flex; align-items: center; gap: 15px; }
        .doc-icon { font-size: 24px; }
        .doc-title { font-weight: bold; }
        .btn-view { background: var(--navy); color: white; padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; }
    </style>
</head>
<body>

    <div class="header-ops">
        <h1 style="margin:0;">DOCUMENTS OPS</h1>
        <p style="margin:5px 0 0 0; opacity:0.8;">Référentiels & Procédures</p>
    </div>

    <div class="container">
        <a href="javascript:history.back()" class="btn-back">⬅️ RETOUR</a>

        <div id="listeDocs" class="doc-list">
            <p style="text-align:center;">Chargement des documents...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
            authDomain: "secours-nautique-31.firebaseapp.com",
            projectId: "secours-nautique-31",
            storageBucket: "secours-nautique-31.firebasestorage.app",
            messagingSenderId: "1013387329575",
            appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function chargerDocuments() {
            const listeDiv = document.getElementById('listeDocs');
            try {
                const q = query(collection(db, "bibliotheque_ops"), orderBy("date", "desc"));
                const snap = await getDocs(q);
                listeDiv.innerHTML = "";

                if (snap.empty) {
                    listeDiv.innerHTML = "<p style='text-align:center;'>Aucun document disponible pour le moment.</p>";
                    return;
                }

                snap.forEach(doc => {
                    const data = doc.data();
                    const html = `
                        <a href="${data.url}" target="_blank" class="doc-item">
                            <div class="doc-info">
                                <span class="doc-icon">📄</span>
                                <span class="doc-title">${data.titre}</span>
                            </div>
                            <div class="btn-view">VOIR</div>
                        </a>
                    `;
                    listeDiv.innerHTML += html;
                });
            } catch (e) {
                console.error(e);
                listeDiv.innerHTML = "<p>Erreur lors du chargement.</p>";
            }
        }

        chargerDocuments();
    </script>
</body>
</html>
