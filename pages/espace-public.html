<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Opérationnel — SDIS 31</title>
    <link rel="stylesheet" href="../css/main.css">
    <style>
        :root { --navy: #0B1F3A; --amber: #E8A020; --light-bg: #F0F2F5; }
        body { font-family: 'Barlow', sans-serif; background: var(--light-bg); margin: 0; padding: 0; }
        
        .header-agent { background: var(--navy); color: white; padding: 20px; text-align: center; border-bottom: 4px solid var(--amber); }
        .container { max-width: 600px; margin: 20px auto; padding: 10px; }

        /* Le bouton Retour qui remplace le bouton Menu */
        .btn-retour { 
            display: block; 
            width: 100%; 
            background: white; 
            padding: 15px; 
            border-radius: 12px; 
            text-align: center; 
            text-decoration: none; 
            color: var(--navy); 
            font-weight: bold; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            margin-bottom: 20px;
            border: 2px solid var(--amber);
        }

        /* Liste des docs façon "Menu" pour rester dans le design */
        .menu-grid { display: grid; grid-template-columns: 1fr; gap: 15px; }
        .doc-btn { 
            background: white; 
            padding: 20px; 
            border-radius: 12px; 
            text-align: left; 
            text-decoration: none; 
            color: var(--navy); 
            font-weight: bold; 
            box-shadow: 0 2px 5px rgba(0,0,0,0.05); 
            display: flex;
            align-items: center;
            gap: 15px;
        }
        .doc-btn:active { transform: scale(0.95); background: var(--amber); }
        .icon { font-size: 24px; }
    </style>
</head>
<body>

    <div class="header-agent">
        <h1 style="margin:0;">DOCUMENTS OPS</h1>
        <p style="margin:5px 0 0 0; opacity:0.8;">Accès réservé aux agents</p>
    </div>

    <div class="container">
        <a href="javascript:history.back()" class="btn-retour">⬅️ RETOUR À L'ACCUEIL</a>

        <div id="listeDocs" class="menu-grid">
            <p style="text-align:center;">Chargement des documents...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
            authDomain: "secours-nautique-31.firebaseapp.com",
            projectId: "secours-nautique-31",
            storageBucket: "secours-nautique-31.firebasestorage.app",
            messagingSenderId: "1013387329575",
            appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function chargerDocs() {
            const liste = document.getElementById('listeDocs');
            try {
                const q = query(collection(db, "bibliotheque_ops"), orderBy("date", "desc"));
                const snap = await getDocs(q);
                liste.innerHTML = "";

                if(snap.empty) {
                    liste.innerHTML = "<p style='text-align:center;'>Aucun document disponible.</p>";
                    return;
                }

                snap.forEach(doc => {
                    const d = doc.data();
                    liste.innerHTML += `
                        <a href="${d.url}" target="_blank" class="doc-btn">
                            <span class="icon">📄</span>
                            <span>${d.titre}</span>
                        </a>`;
                });
            } catch (e) { liste.innerHTML = "Erreur de chargement."; }
        }
        chargerDocs();
    </script>
</body>
</html>
