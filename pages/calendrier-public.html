<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Calendrier Agent — SDIS 31</title>
  
  <script src='https://cdn.jsdelivr.net/npm/fullcalendar@6.1.8/index.global.min.js'></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --bg: #F4F6F8; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    
    .container { max-width: 1100px; margin: 60px auto 20px auto; background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    
    .fc { --fc-border-color: #EEE; --fc-button-bg-color: #0B1F3A; --fc-button-border-color: #0B1F3A; }
    .fc-event { cursor: pointer; padding: 2px 5px; border: none !important; background-color: var(--navy) !important; color: white !important; font-size: 0.75rem !important; }
    
    .user-session { position: fixed; top: 15px; right: 15px; z-index: 9999; background: white; padding: 8px 15px; border-radius: 8px; border: 1px solid #DDD; font-weight: bold; color: var(--navy); box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
    .btn-back { position: fixed; top: 15px; left: 15px; z-index: 9999; background: #0B1F3A; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid #E8A020; }

    .modal { display: none; position: fixed; z-index: 10000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); }
    .modal-content { background: white; margin: 10% auto; padding: 30px; width: 400px; border-radius: 12px; text-align: center; }
    
    .btn-main { background: var(--navy); color: white; border: none; padding: 12px; width: 100%; border-radius: 6px; cursor: pointer; font-weight: bold; margin-top: 15px; font-size: 1rem; }
  </style>
</head>
<body>

  <a href="espace-public.html" class="btn-back">⬅ RETOUR</a>

  <div class="user-session" id="sessionDisplay">Agent : ...</div>

  <div class="container">
    <div id='calendar'></div>
  </div>

  <div id="modalEvent" class="modal">
    <div class="modal-content">
      <h2 id="modalTitle" style="margin-top:0; color: var(--navy);">Formation</h2>
      <p id="detLieu" style="font-weight: bold; color: #555;"></p>
      
      <hr style="border: 0; border-top: 1px solid #EEE; margin: 15px 0;">
      
      <div id="detInscrits" style="margin: 10px 0; font-size: 0.9rem; color: #666;"></div>
      
      <button class="btn-main" id="btnInscrire" style="background: #2A9D5C;">M'INSCRIRE</button>
      <button class="btn-main" id="btnDesinscrire" style="background: #D94040; display:none;">SE DÉSISTER</button>
      
      <button onclick="fermerModal()" style="width:100%; background:none; border:none; color:gray; cursor:pointer; margin-top:15px;">Fermer</button>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, updateDoc, arrayUnion, arrayRemove, getDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
        authDomain: "secours-nautique-31.firebaseapp.com",
        projectId: "secours-nautique-31",
        storageBucket: "secours-nautique-31.firebasestorage.app",
        messagingSenderId: "1013387329575",
        appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // RÉCUPÉRATION DE L'AGENT DEPUIS LE LOCALSTORAGE
    const agentConnecte = localStorage.getItem('agentNomSelected');
    if(!agentConnecte) {
        alert("Veuillez d'abord choisir votre nom sur la page d'accueil.");
        window.location.href = "espace-public.html";
    }
    document.getElementById('sessionDisplay').innerText = "Agent : " + agentConnecte;

    let calendar;

    async function init() {
        const calendarEl = document.getElementById('calendar');
        calendar = new FullCalendar.Calendar(calendarEl, {
            initialView: 'dayGridMonth',
            locale: 'fr',
            firstDay: 1,
            headerToolbar: { left: 'prev,next today', center: 'title', right: 'dayGridMonth,multiMonthYear' },
            buttonText: { today: "Aujourd'hui", month: "Mois", year: "Année" },
            events: async (info, success, failure) => {
                const snap = await getDocs(collection(db, "formations"));
                const evts = [];
                snap.forEach(d => {
                    const data = d.data();
                    evts.push({
                        id: d.id,
                        title: `${data.nom}`,
                        start: data.date,
                        extendedProps: { ...data }
                    });
                });
                success(evts);
            },
            // DÉSCRIPTION : Pas de création possible pour l'agent au clic sur une date
            dateClick: null, 
            eventClick: (info) => ouvrirDetails(info.event)
        });
        calendar.render();
    }

    function ouvrirDetails(event) {
        const data = event.extendedProps;
        const id = event.id;
        const inscrits = data.inscrits || [];

        document.getElementById('modalTitle').innerText = data.nom;
        document.getElementById('detLieu').innerText = "📍 Lieu : " + data.lieu;
        document.getElementById('detInscrits').innerText = inscrits.length + " inscrit(s).";
        
        const estInscrit = inscrits.includes(agentConnecte);
        document.getElementById('btnInscrire').style.display = estInscrit ? "none" : "block";
        document.getElementById('btnDesinscrire').style.display = estInscrit ? "block" : "none";

        document.getElementById('btnInscrire').onclick = () => inscrire(id);
        document.getElementById('btnDesinscrire').onclick = () => desinscrire(id);
        
        document.getElementById('modalEvent').style.display = 'block';
    }

    async function inscrire(formationId) {
        try {
            const formationRef = doc(db, "formations", formationId);
            await updateDoc(formationRef, { inscrits: arrayUnion(agentConnecte) });
            alert("Inscription validée !");
            fermerModal(); calendar.refetchEvents();
        } catch (e) { alert("Erreur"); }
    }

    async function desinscrire(formationId) {
        try {
            const formationRef = doc(db, "formations", formationId);
            await updateDoc(formationRef, { inscrits: arrayRemove(agentConnecte) });
            alert("Désinscription prise en compte.");
            fermerModal(); calendar.refetchEvents();
        } catch (e) { alert("Erreur"); }
    }

    window.fermerModal = () => document.getElementById('modalEvent').style.display = 'none';

    init();
  </script>
</body>
</html>
