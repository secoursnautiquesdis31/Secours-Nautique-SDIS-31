<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Dashboard — SDIS 31</title>
    <link rel="stylesheet" href="css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B1F3A; --amber: #E8A020; --danger: #D94040; }
        body { font-family: 'Barlow', sans-serif; background: #F4F6F8; margin: 0; padding: 20px; }
        .header { background: var(--navy); color: white; padding: 20px; border-radius: 8px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .menu-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; }
        .menu-card { background: white; padding: 30px; border-radius: 12px; text-decoration: none; color: var(--navy); text-align: center; font-weight: bold; border-bottom: 4px solid var(--amber); transition: 0.3s; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .menu-card:hover { transform: translateY(-5px); background: #fdfdfd; }
        .section-title { width: 100%; grid-column: 1 / -1; margin-top: 20px; padding: 10px; color: #666; text-transform: uppercase; font-size: 0.9rem; letter-spacing: 1px; border-bottom: 1px solid #ddd; }
    </style>
</head>
<body>

<div class="header">
    <div style="font-weight: bold;">SDIS 31 — SECOURS NAUTIQUE</div>
    <div id="dateJour"></div>
</div>

<h1 style="color: var(--navy); margin-bottom: 30px;">Console d'Administration</h1>

<div class="menu-grid">
    <div class="section-title">Gestion Administrative</div>
    
    <a href="rh.html" class="menu-card">👥 ANNUAIRE RH</a>
    
    <a href="formations.html" class="menu-card">📅 GÉRER LES FORMATIONS</a>

    <a href="gestion-inscriptions.html" class="menu-card">📋 SUIVI DES INSCRIPTIONS</a>

    <div class="section-title">Logistique</div>
    
    <a href="stocks.html" class="menu-card">📦 GESTION DES STOCKS</a>
    
    <a href="maintenance.html" class="menu-card">🛠️ MAINTENANCE</a>

    <div class="section-title">Utilisateur</div>
    
    <a href="espace-public.html" class="menu-card" style="border-bottom-color: #666;">🌐 ACCÈS ESPACE PUBLIC</a>
</div>

<script>
    // Nettoyage sécurité
    localStorage.removeItem('modeConsultation');

    // Affichage date
    const d = new Date();
    const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
    document.getElementById('dateJour').innerText = d.toLocaleDateString('fr-FR', options).toUpperCase();
</script>

</body>
</html>
