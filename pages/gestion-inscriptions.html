<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Suivi Global des Inscriptions — SDIS 31</title>
    <link rel="stylesheet" href="../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B1F3A; --amber: #E8A020; --danger: #D94040; --green: #2A9D5C; }
        body { font-family: 'Barlow', sans-serif; background: #F4F6F8; padding: 20px; }
        .admin-card { max-width: 1000px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        h1 { color: var(--navy); border-bottom: 3px solid var(--amber); padding-bottom: 10px; }
        
        .formation-block { margin-bottom: 30px; border: 1px solid #DDD; border-radius: 8px; overflow: hidden; }
        .formation-header { background: var(--navy); color: white; padding: 15px; display: flex; justify-content: space-between; align-items: center; }
        .formation-header h3 { margin: 0; font-size: 1.1rem; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        th { background: #F8F9FA; text-align: left; padding: 12px; border-bottom: 2px solid #EEE; font-size: 0.85rem; color: #555; }
        td { padding: 10px 12px; border-bottom: 1px solid #F0F0F0; }
        
        .statut-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; text-transform: uppercase; }
        .badge-inscrit { background: #EEE; color: #666; }
        .badge-present { background: #D1E7DD; color: #0F5132; }
        .badge-absent { background: #F8D7DA; color: #842029; }

        .no-inscrit { padding: 15px; color: #888; font-style: italic; text-align: center; }
        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--navy); font-weight: bold; }
    </style>
</head>
<body>

<div class="admin-card">
    <a href="dashboard.html" class="btn-back">← Retour au Dashboard</a>
    <h1>Récapitulatif des Inscriptions</h1>
    <p>Liste de toutes les formations et des personnels inscrits.</p>

    <div id="containerInscriptions">
        <p style="text-align:center; padding:50px;">Chargement des données...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
      authDomain: "secours-nautique-31.firebaseapp.com",
      projectId: "secours-nautique-31",
      storageBucket: "secours-nautique-31.firebasestorage.app",
      messagingSenderId: "1013387329575",
      appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    async function chargerInscriptions() {
        const container = document.getElementById('containerInscriptions');
        try {
            const fSnap = await getDocs(collection(db, "formations"));
            container.innerHTML = "";

            // Tri par date (plus récentes en premier)
            const formations = fSnap.docs
                .map(doc => ({ id: doc.id, ...doc.data() }))
                .sort((a, b) => new Date(b.date) - new Date(a.date));

            if (formations.length === 0) {
                container.innerHTML = "<p>Aucune formation trouvée.</p>";
                return;
            }

            formations.forEach(f => {
                const dateFmt = f.date ? new Date(f.date).toLocaleDateString('fr-FR') : "Date inconnue";
                const inscrits = f.inscrits || [];

                let htmlInscrits = "";
                if (inscrits.length > 0) {
                    htmlInscrits = `
                        <table>
                            <thead>
                                <tr>
                                    <th>Nom de l'agent</th>
                                    <th>Statut</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${inscrits.map(i => {
                                    let classeBadge = "badge-inscrit";
                                    let texteBadge = "Inscrit";
                                    if(i.statut === "présent") { classeBadge = "badge-present"; texteBadge = "Présent"; }
                                    if(i.statut === "absent") { classeBadge = "badge-absent"; texteBadge = "Absent"; }
                                    
                                    return `
                                        <tr>
                                            <td><strong>${i.nom}</strong></td>
                                            <td><span class="statut-badge ${classeBadge}">${texteBadge}</span></td>
                                        </tr>
                                    `;
                                }).join('')}
                            </tbody>
                        </table>
                    `;
                } else {
                    htmlInscrits = `<div class="no-inscrit">Aucun inscrit pour le moment</div>`;
                }

                container.innerHTML += `
                    <div class="formation-block">
                        <div class="formation-header">
                            <h3>${f.nom}</h3>
                            <span>📅 ${dateFmt} — 📍 ${f.lieu || 'Non précisé'}</span>
                        </div>
                        ${htmlInscrits}
                    </div>
                `;
            });

        } catch (error) {
            console.error(error);
            container.innerHTML = "<p style='color:red;'>Erreur lors du chargement des données.</p>";
        }
    }

    chargerInscriptions();
</script>
</body>
</html>
