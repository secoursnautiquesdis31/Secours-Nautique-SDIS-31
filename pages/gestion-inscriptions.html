<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Suivi Global des Inscriptions — SDIS 31</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B1F3A; --amber: #E8A020; --bg: #F4F6F8; }
        body { font-family: 'Barlow', sans-serif; background: var(--bg); padding: 20px; color: #333; }
        
        .admin-card { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; padding: 30px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        h1 { color: var(--navy); border-bottom: 3px solid var(--amber); padding-bottom: 10px; margin-bottom: 5px; }
        .subtitle { color: #666; margin-bottom: 30px; }

        .formation-block { margin-bottom: 15px; border-radius: 8px; border: 1px solid #EEE; overflow: hidden; transition: transform 0.2s; }
        .formation-block:hover { transform: translateY(-2px); box-shadow: 0 4px 10px rgba(0,0,0,0.05); }
        
        .formation-header { 
            padding: 15px 20px; 
            display: flex; 
            justify-content: space-between; 
            align-items: center; 
            cursor: pointer;
            background: #FFF;
            border-left: 6px solid var(--navy);
        }

        .formation-header h3 { margin: 0; font-size: 1rem; font-weight: 700; color: var(--navy); }
        .info-tags { font-size: 0.85rem; color: #666; display: flex; gap: 15px; }

        /* COULEURS SYNCHRONISÉES AVEC LE CALENDRIER */
        .border-sav { border-left-color: #2A9D5C !important; } /* Vert SAV SEV */
        .border-mer { border-left-color: #87CEFA !important; } /* Bleu ciel Mer */
        .border-cen { border-left-color: #E8A020 !important; } /* Ambre CEN */
        .border-mso { border-left-color: #E2725B !important; } /* Terracotta MSO */
        .border-entrainement { border-left-color: #FFD700 !important; } /* Jaune Entrainement */
        .border-tests { border-left-color: #D94040 !important; } /* Rouge Tests */

        .details-content { display: none; background: #FAFAFA; border-top: 1px solid #EEE; }
        table { width: 100%; border-collapse: collapse; font-size: 0.9rem; }
        th { text-align: left; padding: 12px 20px; color: #888; font-weight: normal; border-bottom: 1px solid #EEE; }
        td { padding: 10px 20px; border-bottom: 1px solid #F0F0F0; }

        .statut-badge { padding: 3px 10px; border-radius: 20px; font-size: 0.7rem; font-weight: bold; text-transform: uppercase; }
        .badge-inscrit { background: #E9ECEF; color: #495057; }
        .badge-present { background: #D1E7DD; color: #0F5132; }
        .badge-absent { background: #F8D7DA; color: #842029; }

        .btn-back { display: inline-block; margin-bottom: 20px; text-decoration: none; color: var(--navy); font-weight: bold; font-size: 0.9rem; }
        .count-badge { background: #EEE; padding: 2px 8px; border-radius: 10px; font-size: 0.8rem; margin-left: 10px; }
    </style>
</head>
<body>

<div class="admin-card">
    <a href="dashboard.html" class="btn-back">← Retour au Dashboard</a>
    <h1>Récapitulatif des Inscriptions</h1>
    <p class="subtitle">Cliquez sur une formation pour voir le détail des personnels.</p>

    <div id="containerInscriptions">
        <p style="text-align:center; padding:50px;">Chargement des données...</p>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
      authDomain: "secours-nautique-31.firebaseapp.com",
      projectId: "secours-nautique-31",
      storageBucket: "secours-nautique-31.firebasestorage.app",
      messagingSenderId: "1013387329575",
      appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    window.toggleDetails = (id) => {
        const content = document.getElementById('details-' + id);
        content.style.display = content.style.display === 'block' ? 'none' : 'block';
    };

    async function chargerInscriptions() {
        const container = document.getElementById('containerInscriptions');
        try {
            const fSnap = await getDocs(collection(db, "formations"));
            container.innerHTML = "";

            const formations = fSnap.docs
                .map(doc => ({ id: doc.id, ...doc.data() }))
                .sort((a, b) => new Date(a.date) - new Date(b.date));

            formations.forEach(f => {
                const dateFmt = f.date ? new Date(f.date).toLocaleDateString('fr-FR') : "??";
                const dateFinFmt = f.dateFin ? new Date(f.dateFin).toLocaleDateString('fr-FR') : dateFmt;
                const dateAffichage = (dateFmt === dateFinFmt) ? dateFmt : `Du ${dateFmt} au ${dateFinFmt}`;
                const inscrits = f.inscrits || [];

                // --- LOGIQUE DE COULEUR SYNCHRONISÉE ---
                let colorClass = "";
                const nomMaj = (f.nom || "").toUpperCase();

                if (nomMaj.includes("FMPA SAV SEV") || nomMaj.includes("FI SAV SEV")) {
                    colorClass = "border-sav";
                } else if (nomMaj.includes("FMPA MER")) {
                    colorClass = "border-mer";
                } else if (nomMaj.includes("FMPA CEN") || nomMaj.includes("FI CEN")) {
                    colorClass = "border-cen";
                } else if (nomMaj.includes("MSO")) {
                    colorClass = "border-mso";
                } else if (nomMaj.includes("ENTRAINEMENT")) {
                    colorClass = "border-entrainement";
                } else if (nomMaj.includes("TESTS ANNUELS")) {
                    colorClass = "border-tests";
                }

                let htmlTable = `
                    <div class="details-content" id="details-${f.id}">
                        ${inscrits.length > 0 ? `
                        <table>
                            <thead>
                                <tr><th>Nom de l'agent</th><th>Statut</th></tr>
                            </thead>
                            <tbody>
                                ${inscrits.map(i => {
                                    let badgeClass = "badge-inscrit";
                                    let texteStatut = "INSCRIT";

                                    if (i.statut === 'présent') {
                                        badgeClass = "badge-present";
                                        texteStatut = "PRÉSENT";
                                    } else if (i.statut === 'absent') {
                                        badgeClass = "badge-absent";
                                        texteStatut = "ABSENT";
                                    }

                                    return `
                                    <tr>
                                        <td><strong>${i.nom}</strong></td>
                                        <td><span class="statut-badge ${badgeClass}">${texteStatut}</span></td>
                                    </tr>`;
                                }).join('')}
                            </tbody>
                        </table>` : '<div style="padding:20px; color:#999; text-align:center;">Aucun inscrit</div>'}
                    </div>`;

                container.innerHTML += `
                    <div class="formation-block">
                        <div class="formation-header ${colorClass}" onclick="toggleDetails('${f.id}')">
                            <div>
                                <h3>${f.nom} <span class="count-badge">${inscrits.length}</span></h3>
                            </div>
                            <div class="info-tags">
                                <span>📅 ${dateAffichage}</span>
                                <span>📍 ${f.lieu || '??'}</span>
                                <span>▼</span>
                            </div>
                        </div>
                        ${htmlTable}
                    </div>
                `;
            });

        } catch (error) {
            console.error(error);
            container.innerHTML = "<p>Erreur de chargement.</p>";
        }
    }

    chargerInscriptions();
</script>
</body>
</html>
