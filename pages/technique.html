<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Technique — SDIS 31 Nautique</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .tech-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .stock-card { background: white; border-radius: 12px; box-shadow: var(--shadow-sm); padding: 20px; }
    table { width: 100%; border-collapse: collapse; font-family: var(--font-body); }
    th { text-align: left; padding: 12px; border-bottom: 2px solid var(--gray-100); color: var(--navy); font-family: var(--font-display); text-transform: uppercase; }
    td { padding: 12px; border-bottom: 1px solid var(--gray-100); vertical-align: middle; }
    .alert-row { background-color: #fff5f5; }
    .status-badge { padding: 4px 8px; border-radius: 4px; font-size: 0.75rem; font-weight: bold; }
    .badge-ok { background: #e6fffa; color: #2c7a7b; }
    .badge-warn { background: #fff5f5; color: #c53030; animation: pulse 2s infinite; }
    @keyframes pulse { 0% {opacity: 1;} 50% {opacity: 0.7;} 100% {opacity: 1;} }
    .btn-import { background: var(--navy); color: white; border: none; padding: 10px 15px; border-radius: 6px; cursor: pointer; }
  </style>
</head>
<body class="app-layout">
  <div class="page-content">
    <div class="tech-header">
      <h1>Inventaire & Stocks</h1>
      <button class="btn-import" onclick="document.getElementById('csvStock').click()">📦 Importer Stock CSV</button>
      <input type="file" id="csvStock" accept=".csv" style="display:none">
    </div>

    <div class="stock-card">
      <table>
        <thead>
          <tr>
            <th>Matériel</th>
            <th>Taille</th>
            <th>Quantité</th>
            <th>Seuil</th>
            <th>Péremption</th>
            <th>État</th>
          </tr>
        </thead>
        <tbody id="stockTable">
          <tr><td colspan="6">Chargement des données...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <script type="module">
    import { db, collection, getDocs, doc, setDoc } from "./auth.js";

    const tableBody = document.getElementById('stockTable');
    const fileInput = document.getElementById('csvStock');

    // 1. CHARGEMENT DU STOCK
    async function loadStock() {
      const snap = await getDocs(collection(db, "stocks"));
      tableBody.innerHTML = "";
      
      let items = [];
      snap.forEach(d => items.push({id: d.id, ...d.data()}));
      
      // Tri alphabétique par type
      items.sort((a,b) => a.type.localeCompare(b.type));

      items.forEach(item => {
        const q = parseInt(item.quantite) || 0;
        const s = parseInt(item.seuil) || 0;
        const isAlert = q <= s && s > 0;
        
        const tr = document.createElement('tr');
        if(isAlert) tr.className = "alert-row";
        
        tr.innerHTML = `
          <td><strong>${item.type}</strong></td>
          <td>${item.taille || '-'}</td>
          <td style="font-weight:bold; color:${isAlert ? 'red' : 'inherit'}">${q}</td>
          <td>${s}</td>
          <td>${item.peremption || '-'}</td>
          <td>
            <span class="status-badge ${isAlert ? 'badge-warn' : 'badge-ok'}">
              ${isAlert ? '⚠️ RÉAPPRO' : 'OK'}
            </span>
          </td>
        `;
        tableBody.appendChild(tr);
      });
    }

    // 2. IMPORTATION DU FICHIER CSV
    fileInput.onchange = (e) => {
      const file = e.target.files[0];
      const reader = new FileReader();
      reader.onload = async (event) => {
        const lignes = event.target.result.split(/\r?\n/);
        let dernierType = "";
        let count = 0;

        for (let i = 1; i < lignes.length; i++) {
          const col = lignes[i].split(';');
          if (col.length < 4) continue;

          let type = col[0] ? col[0].trim() : dernierType;
          if (!type) continue;
          dernierType = type;

          const taille = col[2] ? col[2].trim() : "";
          const quantite = col[3] ? col[3].trim() : "0";
          const seuil = col[4] ? col[4].trim() : "0";
          const peremp = col[5] ? col[5].trim() : "";

          // ID unique basé sur Type + Taille
          const id = (type + "_" + taille).toLowerCase().replace(/[^a-z0-9]/g, '_');

          await setDoc(doc(db, "stocks", id), {
            type, taille, quantite, seuil, peremption: peremp
          });
          count++;
        }
        alert(count + " articles mis à jour dans le stock !");
        loadStock();
      };
      reader.readAsText(file, 'ISO-8859-1');
    };

    loadStock();
  </script>
</body>
</html>
