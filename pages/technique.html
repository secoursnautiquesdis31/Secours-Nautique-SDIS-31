<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Technique — SDIS 31</title>
  <link rel="stylesheet" href="../css/main.css">
  <style>
    .tech-container { padding: 20px; font-family: sans-serif; }
    .header-flex { display: flex; justify-content: space-between; align-items: center; background: #0B1F3A; color: white; padding: 15px; border-radius: 8px; margin-bottom: 20px; }
    .btn-import { background: #E8A020; color: #0B1F3A; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
    table { width: 100%; border-collapse: collapse; background: white; }
    th { background: #f4f6f8; color: #0B1F3A; padding: 12px; text-align: left; border-bottom: 2px solid #dee2e6; }
    td { padding: 10px; border-bottom: 1px solid #eee; }
    .alert-row { background: #fff5f5 !important; color: #c53030; font-weight: bold; }
    input { border: 1px solid #ccc; padding: 4px; border-radius: 4px; width: 90%; }
  </style>
</head>
<body style="background: #f8f9fa;">

  <div class="tech-container">
    <div class="header-flex">
      <h1>DOSSIER TECHNIQUE</h1>
      <button class="btn-import" onclick="document.getElementById('csvInput').click()">📥 IMPORTER CSV STOCK</button>
      <input type="file" id="csvInput" accept=".csv" style="display:none">
    </div>

    <table>
      <thead>
        <tr>
          <th>Matériel</th>
          <th>Taille</th>
          <th>Stock</th>
          <th>Seuil</th>
          <th>Péremption</th>
          <th>Action</th>
        </tr>
      </thead>
      <tbody id="stockBody">
        <tr><td colspan="6" style="text-align:center; padding:40px;">Veuillez importer votre fichier CSV pour commencer.</td></tr>
      </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs, doc, setDoc, updateDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    // 🔴 METS TES PROPRES CLÉS ICI (voir ton fichier auth.js)
    const firebaseConfig = {
      apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
        authDomain: "secours-nautique-31.firebaseapp.com",
        projectId: "secours-nautique-31",
        storageBucket: "secours-nautique-31.firebasestorage.app",
        messagingSenderId: "1013387329575",
        appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const stockBody = document.getElementById('stockBody');

    // CHARGEMENT
    async function charger() {
      const snap = await getDocs(collection(db, "stocks"));
      stockBody.innerHTML = "";
      if (snap.empty) {
        stockBody.innerHTML = "<tr><td colspan='6' style='text-align:center; padding:40px;'>Base vide. Importez le CSV.</td></tr>";
        return;
      }
      snap.forEach(d => {
        const item = d.data();
        const id = d.id;
        const alert = parseInt(item.quantite) <= parseInt(item.seuil);
        const tr = document.createElement('tr');
        if(alert) tr.className = "alert-row";
        tr.innerHTML = `
          <td><input type="text" value="${item.type}" onchange="update('${id}','type',this.value)"></td>
          <td><input type="text" value="${item.taille||''}" onchange="update('${id}','taille',this.value)"></td>
          <td><input type="number" value="${item.quantite}" onchange="update('${id}','quantite',this.value)"></td>
          <td><input type="number" value="${item.seuil}" onchange="update('${id}','seuil',this.value)"></td>
          <td><input type="text" value="${item.peremption||''}" onchange="update('${id}','peremption',this.value)"></td>
          <td><button onclick="suppr('${id}')">🗑️</button></td>
        `;
        stockBody.appendChild(tr);
      });
    }

    // IMPORT CSV
    document.getElementById('csvInput').onchange = (e) => {
      const reader = new FileReader();
      reader.onload = async (ev) => {
        const lignes = ev.target.result.split(/\r?\n/);
        let dernierType = "";
        let count = 0;
        for (let i = 1; i < lignes.length; i++) {
          const col = lignes[i].split(';');
          if (col.length < 3) continue;
          let type = col[0].trim() || dernierType;
          if (!type || type.toLowerCase().includes("type")) continue;
          dernierType = type;
          const id = (type + "_" + (col[2]||'')).toLowerCase().replace(/[^a-z0-9]/g, '_');
          await setDoc(doc(db, "stocks", id), {
            type, taille: col[2]||"", quantite: parseInt(col[3])||0, seuil: parseInt(col[4])||0, peremption: col[5]||""
          });
          count++;
        }
        alert(count + " articles importés !");
        charger();
      };
      reader.readAsText(e.target.files[0], 'ISO-8859-1');
    };

    window.update = async (id, f, v) => {
      const val = (f==='quantite'||f==='seuil') ? parseInt(v) : v;
      await updateDoc(doc(db, "stocks", id), {[f]: val});
    };
    
    window.suppr = async (id) => {
      if(confirm("Supprimer ?")) { await deleteDoc(doc(db, "stocks", id)); charger(); }
    };

    charger();
  </script>
</body>
</html>
