<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Technique — SDIS 31 Nautique</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600&family=Barlow:wght@400;500&display=swap" rel="stylesheet">
  <style>
    .stock-table { width: 100%; border-collapse: collapse; background: white; border-radius: 8px; overflow: hidden; }
    .stock-table th { background: var(--navy); color: white; padding: 12px; text-align: left; }
    .stock-table td { padding: 12px; border-bottom: 1px solid var(--gray-100); }
    .status-alert { color: var(--danger); font-weight: bold; animation: blink 2s infinite; }
    @keyframes blink { 0% {opacity: 1;} 50% {opacity: 0.5;} 100% {opacity: 1;} }
    .badge-size { background: var(--gray-100); padding: 2px 6px; border-radius: 4px; font-size: 0.8rem; }
    .btn-add { background: var(--amber); border: none; padding: 10px 20px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-bottom: 20px; }
  </style>
</head>
<body class="app-layout">
  <div class="page-content">
    <div class="page-header">
      <h1>Dossier Technique : Inventaire & Stocks</h1>
      <button class="btn-add" onclick="ouvrirModal()">+ Ajouter du matériel</button>
    </div>

    <table class="stock-table">
      <thead>
        <tr>
          <th>Type / Désignation</th>
          <th>Taille</th>
          <th>Quantité</th>
          <th>Seuil Alerte</th>
          <th>Péremption</th>
          <th>État</th>
        </tr>
      </thead>
      <tbody id="stockBody">
        </tbody>
    </table>
  </div>

  <script type="module">
    import { db, collection, getDocs } from "./auth.js";

    async function chargerStock() {
      const container = document.getElementById('stockBody');
      const querySnapshot = await getDocs(collection(db, "stocks"));
      container.innerHTML = "";

      querySnapshot.forEach((doc) => {
        const item = doc.data();
        const estEnAlerte = parseInt(item.quantite) <= parseInt(item.seuil);
        const datePeremp = item.peremption ? new Date(item.peremption) : null;
        const estPerime = datePeremp && datePeremp < new Date();

        const tr = document.createElement('tr');
        tr.innerHTML = `
          <td><strong>${item.type}</strong></td>
          <td><span class="badge-size">${item.taille || 'N/A'}</span></td>
          <td style="font-weight:bold; ${estEnAlerte ? 'color:red' : ''}">${item.quantite}</td>
          <td>${item.seuil}</td>
          <td style="${estPerime ? 'color:red; font-weight:bold' : ''}">${item.peremption || '—'}</td>
          <td>
            ${estEnAlerte ? '<span class="status-alert">⚠️ RÉAPPRO !</span>' : ''}
            ${estPerime ? '<span class="status-alert">❌ PÉRIMÉ !</span>' : ''}
            ${!estEnAlerte && !estPerime ? '<span style="color:green">OK</span>' : ''}
          </td>
        `;
        container.appendChild(tr);
      });
    }
    chargerStock();
  </script>
</body>
</html>
