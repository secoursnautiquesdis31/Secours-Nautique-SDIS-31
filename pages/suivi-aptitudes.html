<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Suivi des Aptitudes Individuelles — SDIS 31</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --green: #2A9D5C; --red: #D94040; --bg: #F4F6F8; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    .container { max-width: 1300px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    
    .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--navy); padding-bottom: 15px; margin-bottom: 20px; }
    
    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: var(--navy); color: white; padding: 12px; text-align: left; font-size: 0.75rem; text-transform: uppercase; letter-spacing: 0.5px; }
    td { padding: 12px; border-bottom: 1px solid #EEE; font-size: 0.9rem; }
    
    .status-badge { padding: 6px 12px; border-radius: 20px; font-weight: bold; font-size: 0.8rem; display: inline-block; min-width: 100px; text-align: center; }
    .ok { background: #D4EDDA; color: var(--green); border: 1px solid var(--green); }
    .ko { background: #F8D7DA; color: var(--red); border: 1px solid var(--red); }
    
    .score-detail { font-weight: bold; color: var(--navy); }
    .quota-info { color: #888; font-size: 0.8rem; }
    
    .btn-export { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
    .btn-export:hover { background: #217a48; }

    .ko-text { color: var(--red); font-weight: bold; }
  </style>
</head>
<body>

  <a href="rh.html" style="position: fixed; top: 15px; left: 15px; z-index: 9999; background: #0B1F3A; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid #E8A020;">← Retour RH</a>

  <div class="container">
    <div class="header-flex">
        <div>
            <h1 style="color: var(--navy); margin:0;">📊 Suivi des Aptitudes Opérationnelles</h1>
            <p style="margin: 5px 0 0 0; color: #666; font-size: 0.9rem;">Calculé selon les objectifs individuels définis dans chaque fiche agent.</p>
        </div>
        <button class="btn-export" id="btnExport">📥 EXPORTER EXCEL (2026)</button>
    </div>

    <table id="tableAptitudes">
        <thead>
            <tr>
                <th>Agent</th>
                <th>Recyclage SAV SEV</th>
                <th>FMPA Mer</th>
                <th>Recyclage CEN</th>
                <th>Entrainement / MSO</th>
                <th style="text-align: center;">Statut Aptitude</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
      authDomain: "secours-nautique-31.firebaseapp.com",
      projectId: "secours-nautique-31",
      storageBucket: "secours-nautique-31.firebasestorage.app",
      messagingSenderId: "1013387329575",
      appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const currentYear = 2026;

    async function genererTableau() {
        const querySnapshot = await getDocs(collection(db, "users"));
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";
        let dataExport = [];

        querySnapshot.forEach((doc) => {
            const agent = doc.data();
            
            // 1. RÉCUPÉRATION DES QUOTAS INDIVIDUELS
            // Si l'agent n'a pas de quotas définis, on utilise des valeurs par défaut
            const q = agent.quotas || { sav: 1, fmpa: 1, cen: 1, mso: 2 };

            // 2. CALCUL DES PRÉSENCES
            const formations = agent.historiqueFormations || [];
            const formationsAnnee = formations.filter(f => new Date(f.date).getFullYear() === currentYear);

            let score = { SAV: 0, FMPA: 0, CEN: 0, MSO: 0 };

            formationsAnnee.forEach(f => {
                const titre = f.nom.toUpperCase();
                if (titre.includes("SAV") || titre.includes("SEV")) score.SAV++;
                else if (titre.includes("FMPA") || titre.includes("MER")) score.FMPA++;
                else if (titre.includes("CEN")) score.CEN++;
                else if (titre.includes("ENTRAINEMENT") || titre.includes("MSO")) score.MSO++;
            });

            // 3. VÉRIFICATION DE L'APTITUDE SELON SES QUOTAS PERSO
            const checkSAV = score.SAV >= q.sav;
            const checkFMPA = score.FMPA >= q.fmpa;
            const checkCEN = score.CEN >= q.cen;
            const checkMSO = score.MSO >= q.mso;

            const isApte = checkSAV && checkFMPA && checkCEN && checkMSO;

            // 4. AFFICHAGE
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${agent.nom}</strong><br><small style="color:#888">${agent.cis || 'N/A'}</small></td>
                <td>
                    <span class="${checkSAV ? 'score-detail' : 'ko-text'}">${score.SAV}</span> 
                    <span class="quota-info">/ ${q.sav}</span>
                </td>
                <td>
                    <span class="${checkFMPA ? 'score-detail' : 'ko-text'}">${score.FMPA}</span> 
                    <span class="quota-info">/ ${q.fmpa}</span>
                </td>
                <td>
                    <span class="${checkCEN ? 'score-detail' : 'ko-text'}">${score.CEN}</span> 
                    <span class="quota-info">/ ${q.cen}</span>
                </td>
                <td>
                    <span class="${checkMSO ? 'score-detail' : 'ko-text'}">${score.MSO}</span> 
                    <span class="quota-info">/ ${q.mso}</span>
                </td>
                <td style="text-align: center;">
                    <span class="status-badge ${isApte ? 'ok' : 'ko'}">${isApte ? '✅ APTE' : '❌ INCOMPLET'}</span>
                </td>
            `;
            tbody.appendChild(tr);

            dataExport.push({
                "Agent": agent.nom,
                "CIS": agent.cis || "",
                "SAV/SEV": `${score.SAV}/${q.sav}`,
                "FMPA Mer": `${score.FMPA}/${q.fmpa}`,
                "Recyclage CEN": `${score.CEN}/${q.cen}`,
                "MSO": `${score.MSO}/${q.mso}`,
                "Aptitude": isApte ? "APTE" : "INCOMPLET"
            });
        });

        document.getElementById('btnExport').onclick = () => {
            const ws = XLSX.utils.json_to_sheet(dataExport);
            const wb = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(wb, ws, "Aptitudes");
            XLSX.writeFile(wb, `Aptitudes_Individuelles_2026.xlsx`);
        };
    }

    genererTableau();
  </script>
</body>
</html>
