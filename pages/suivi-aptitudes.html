<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Suivi des Aptitudes — SDIS 31</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --green: #2A9D5C; --red: #D94040; --bg: #F4F6F8; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    
    .container { max-width: 1100px; margin: 60px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    
    .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--navy); padding-bottom: 15px; margin-bottom: 20px; }
    
    .controls { background: #EEE; padding: 15px; border-radius: 8px; margin-bottom: 20px; display: flex; gap: 20px; align-items: center; }
    input[type="number"] { width: 60px; padding: 8px; border-radius: 4px; border: 1px solid #CCC; font-weight: bold; }

    table { width: 100%; border-collapse: collapse; margin-top: 10px; }
    th { background: var(--navy); color: white; padding: 12px; text-align: left; }
    td { padding: 12px; border-bottom: 1px solid #DDD; }

    .status { padding: 5px 12px; border-radius: 20px; font-weight: bold; font-size: 0.85rem; }
    .status-ok { background: #D4EDDA; color: var(--green); }
    .status-ko { background: #F8D7DA; color: var(--red); }
    
    .count-badge { background: var(--navy); color: white; padding: 2px 8px; border-radius: 10px; font-weight: bold; }
    .btn-export { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <a href="dashboard.html" style="position: fixed; top: 15px; left: 15px; z-index: 9999; background: #0B1F3A; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid #E8A020;">🏠 MENU</a>

  <div class="container">
    <div class="header-flex">
        <h1 style="color: var(--navy); margin:0;">Tableau de Bord des Aptitudes</h1>
        <button class="btn-export" id="btnExport">📊 EXPORTER EXCEL</button>
    </div>

    <div class="controls">
        <div>
            <label>Seuil de validation (jours/an) : </label>
            <input type="number" id="seuilAptitude" value="3" min="1">
        </div>
        <div style="font-size: 0.9rem; color: #666;">
            Année en cours : <strong id="currentYear"></strong>
        </div>
    </div>

    <table>
        <thead>
            <tr>
                <th>Agent</th>
                <th>Spécialité(s)</th>
                <th>Jours de formation</th>
                <th>Statut Aptitude</th>
                <th>Dernière présence</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            <tr><td colspan="5" style="text-align:center;">Chargement des données...</td></tr>
        </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
      authDomain: "secours-nautique-31.firebaseapp.com",
      projectId: "secours-nautique-31",
      storageBucket: "secours-nautique-31.firebasestorage.app",
      messagingSenderId: "1013387329575",
      appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const year = new Date().getFullYear();
    document.getElementById('currentYear').innerText = year;

    async function genererTableau() {
        const seuil = parseInt(document.getElementById('seuilAptitude').value);
        const querySnapshot = await getDocs(collection(db, "users"));
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        let dataPourExport = [];

        querySnapshot.forEach((doc) => {
            const agent = doc.data();
            const historique = agent.historiqueFormations || [];
            
            // Filtrer les formations de l'année en cours
            const formationsAnnee = historique.filter(f => new Date(f.date).getFullYear() === year);
            const nbJours = formationsAnnee.length;
            
            // Trouver la date la plus récente
            let derniereDate = "Aucune";
            if(historique.length > 0) {
                const dates = historique.map(f => new Date(f.date));
                derniereDate = new Date(Math.max(...dates)).toLocaleDateString('fr-FR');
            }

            const estApte = nbJours >= seuil;

            const row = `
                <tr>
                    <td><strong>${agent.nom}</strong></td>
                    <td>${(agent.specialites || []).join(', ') || '-'}</td>
                    <td><span class="count-badge">${nbJours}</span> / ${seuil}</td>
                    <td>
                        <span class="status ${estApte ? 'status-ok' : 'status-ko'}">
                            ${estApte ? '✅ APTE' : '❌ NON VALIDE'}
                        </span>
                    </td>
                    <td>${derniereDate}</td>
                </tr>
            `;
            tbody.innerHTML += row;

            // Préparation export
            dataPourExport.push({
                "Nom de l'agent": agent.nom,
                "Jours de formation": nbJours,
                "Seuil requis": seuil,
                "Statut": estApte ? "APTE" : "INCOMPLET",
                "Dernière formation": derniereDate
            });
        });

        // Event Export
        document.getElementById('btnExport').onclick = () => {
            const worksheet = XLSX.utils.json_to_sheet(dataPourExport);
            const workbook = XLSX.utils.book_new();
            XLSX.utils.book_append_sheet(workbook, worksheet, "Suivi Aptitudes");
            XLSX.writeFile(workbook, `Aptitudes_Nautique_${year}.xlsx`);
        };
    }

    document.getElementById('seuilAptitude').onchange = genererTableau;
    genererTableau();
  </script>
</body>
</html>
