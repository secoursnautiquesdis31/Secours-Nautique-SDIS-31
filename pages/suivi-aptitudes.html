<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Suivi des Aptitudes Spécifiques — SDIS 31</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --green: #2A9D5C; --red: #D94040; --bg: #F4F6F8; }
    body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
    .container { max-width: 1200px; margin: 40px auto; background: white; padding: 30px; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    
    .header-flex { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--navy); padding-bottom: 15px; margin-bottom: 20px; }
    
    /* Zone de configuration des quotas */
    .config-panel { background: #F8F9FA; padding: 20px; border-radius: 8px; margin-bottom: 20px; border: 1px solid #EEE; }
    .config-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 15px; margin-top: 10px; }
    .config-item { display: flex; justify-content: space-between; align-items: center; background: white; padding: 10px; border-radius: 6px; border: 1px solid #DDD; }
    .config-item label { font-weight: bold; font-size: 0.85rem; color: var(--navy); }
    .config-item input { width: 50px; padding: 5px; border-radius: 4px; border: 1px solid #CCC; text-align: center; }

    table { width: 100%; border-collapse: collapse; margin-top: 20px; }
    th { background: var(--navy); color: white; padding: 12px; text-align: left; font-size: 0.8rem; text-transform: uppercase; }
    td { padding: 12px; border-bottom: 1px solid #EEE; font-size: 0.9rem; }
    
    .status-badge { padding: 4px 10px; border-radius: 15px; font-weight: bold; font-size: 0.75rem; }
    .ok { background: #D4EDDA; color: var(--green); }
    .ko { background: #F8D7DA; color: var(--red); }
    
    .btn-export { background: var(--green); color: white; border: none; padding: 10px 20px; border-radius: 6px; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

  <a href="rh.html" style="position: fixed; top: 15px; left: 15px; z-index: 9999; background: #0B1F3A; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid #E8A020;">← Retour RH</a>

  <div class="container">
    <div class="header-flex">
        <h1 style="color: var(--navy); margin:0;">Validation des Aptitudes / Intitulé</h1>
        <button class="btn-export" id="btnExport">📊 EXPORT EXCEL</button>
    </div>

    <div class="config-panel">
        <strong>⚙️ Définir les quotas annuels (Nombre de jours minimum)</strong>
        <div class="config-grid">
            <div class="config-item">
                <label>Formations "CEN"</label>
                <input type="number" id="quota_CEN" value="2" class="quota-input">
            </div>
            <div class="config-item">
                <label>Formations "SAV"</label>
                <input type="number" id="quota_SAV" value="3" class="quota-input">
            </div>
            <div class="config-item">
                <label>Formations "SAL"</label>
                <input type="number" id="quota_SAL" value="2" class="quota-input">
            </div>
            <div class="config-item">
                <label>Autres Manœuvres</label>
                <input type="number" id="quota_AUTRE" value="1" class="quota-input">
            </div>
        </div>
        <p style="font-size: 0.75rem; color: #666; margin-top: 10px;">* Le système cherche si le mot-clé est présent dans l'intitulé de la formation créée dans le calendrier.</p>
    </div>

    <table id="tableAptitudes">
        <thead>
            <tr>
                <th>Agent</th>
                <th>Détail par catégorie (Réalisé / Minimum)</th>
                <th>État Général</th>
            </tr>
        </thead>
        <tbody id="tableBody">
            </tbody>
    </table>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
      authDomain: "secours-nautique-31.firebaseapp.com",
      projectId: "secours-nautique-31",
      storageBucket: "secours-nautique-31.firebasestorage.app",
      messagingSenderId: "1013387329575",
      appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const currentYear = 2026;

    async function calculerAptitudes() {
        // Récupération des quotas saisis
        const quotas = {
            CEN: parseInt(document.getElementById('quota_CEN').value),
            SAV: parseInt(document.getElementById('quota_SAV').value),
            SAL: parseInt(document.getElementById('quota_SAL').value),
            AUTRE: parseInt(document.getElementById('quota_AUTRE').value)
        };

        const querySnapshot = await getDocs(collection(db, "users"));
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = "";

        querySnapshot.forEach((doc) => {
            const agent = doc.data();
            const historique = agent.historiqueFormations || [];
            const formationsAnnee = historique.filter(f => new Date(f.date).getFullYear() === currentYear);

            // Initialisation des compteurs pour cet agent
            let score = { CEN: 0, SAV: 0, SAL: 0, AUTRE: 0 };

            // Analyse des intitulés
            formationsAnnee.forEach(f => {
                const nom = f.nom.toUpperCase();
                if (nom.includes("CEN")) score.CEN++;
                else if (nom.includes("SAV")) score.SAV++;
                else if (nom.includes("SAL")) score.SAL++;
                else score.AUTRE++;
            });

            // Vérification si TOUS les quotas sont remplis
            const isApte = (score.CEN >= quotas.CEN) && 
                           (score.SAV >= quotas.SAV) && 
                           (score.SAL >= quotas.SAL) && 
                           (score.AUTRE >= quotas.AUTRE);

            // Construction de la ligne
            const tr = document.createElement('tr');
            tr.innerHTML = `
                <td><strong>${agent.nom}</strong></td>
                <td>
                    <small>CEN: ${score.CEN}/${quotas.CEN} | </small>
                    <small>SAV: ${score.SAV}/${quotas.SAV} | </small>
                    <small>SAL: ${score.SAL}/${quotas.SAL} | </small>
                    <small>AUTRES: ${score.AUTRE}/${quotas.AUTRE}</small>
                </td>
                <td>
                    <span class="status-badge ${isApte ? 'ok' : 'ko'}">
                        ${isApte ? '✅ APTE' : '❌ INCOMPLET'}
                    </span>
                </td>
            `;
            tbody.appendChild(tr);
        });
    }

    // Relancer le calcul quand on change un quota
    document.querySelectorAll('.quota-input').forEach(input => {
        input.onchange = calculerAptitudes;
    });

    calculerAptitudes();
  </script>
</body>
</html>
