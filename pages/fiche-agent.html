<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiche Agent — SDIS 31</title>
  <link rel="stylesheet" href="../css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root { --navy: #0B1F3A; --amber: #E8A020; --danger: #D94040; --success: #2A9D5C; }
    body { font-family: 'Barlow', sans-serif; background: #F4F6F8; margin: 0; padding: 20px; }
    .fiche-card { max-width: 800px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    .header { background: var(--navy); color: white; padding: 30px; position: relative; }
    .back-btn { color: white; text-decoration: none; font-size: 0.9em; opacity: 0.7; }
    .back-btn:hover { opacity: 1; }
    
    .content { padding: 30px; }
    .section-title { border-bottom: 2px solid #EEE; padding-bottom: 10px; margin-bottom: 20px; color: var(--navy); text-transform: uppercase; letter-spacing: 1px; }
    
    /* Système de Spécialités */
    .specs-grid { display: flex; flex-wrap: wrap; gap: 10px; }
    .spec-tag { 
        padding: 8px 15px; border-radius: 20px; border: 2px solid #DDD; 
        cursor: pointer; font-weight: bold; transition: 0.2s; color: #888;
    }
    .spec-tag.active { border-color: var(--amber); background: var(--amber); color: var(--navy); }
    .spec-tag:hover { transform: scale(1.05); }

    .info-row { display: flex; margin-bottom: 15px; border-bottom: 1px solid #F0F0F0; padding-bottom: 10px; }
    .info-label { width: 150px; font-weight: bold; color: #666; }
  </style>
</head>
<body>

  <div class="fiche-card">
    <div class="header" id="agentHeader">
        <a href="rh.html" class="back-btn">← Retour à la liste</a>
        <h1 id="nomAgent" style="margin: 15px 0 5px 0;">CHARGEMENT...</h1>
        <div id="cisAgent">CIS ...</div>
    </div>

    <div class="content">
      <div class="section-title">Informations Générales</div>
      <div class="info-row"><div class="info-label">Téléphone</div><div id="telAgent">-</div></div>
      <div class="info-row"><div class="info-label">Statut</div><div id="statutAgent">Opérationnel</div></div>

      <div class="section-title">Spécialités (Cliquer pour modifier)</div>
      <div class="specs-grid" id="specsGrid">
          </div>

      <div style="margin-top:40px;" class="section-title">Équipements affectés</div>
      <div id="epiList" style="color:#999; font-style:italic;">Aucun équipement lié pour le moment.</div>
    </div>
  </div>

  <script type="module">
    import { db, doc, getDoc, updateDoc } from "./auth.js";

    const params = new URLSearchParams(window.location.search);
    const agentId = params.get('id');
    
    // Liste des spécialités nautiques du SDIS 31
    const listeSpecs = ["SAL 1", "SAL 2", "COD 1", "COD 2", "PILOTE", "SCAPH"];

    async function chargerAgent() {
        if(!agentId) return;
        const snap = await getDoc(doc(db, "users", agentId));
        
        if (snap.exists()) {
            const agent = snap.data();
            document.getElementById('nomAgent').innerText = agent.nom;
            document.getElementById('cisAgent').innerText = agent.cis || "CIS NON RENSEIGNÉ";
            document.getElementById('telAgent').innerText = agent.tel || "Non renseigné";
            
            const agentSpecs = agent.specialites || [];
            genererSpecs(agentSpecs);
        }
    }

    function genererSpecs(agentSpecs) {
        const grid = document.getElementById('specsGrid');
        grid.innerHTML = "";
        
        listeSpecs.forEach(spec => {
            const isActive = agentSpecs.includes(spec);
            const tag = document.createElement('div');
            tag.className = `spec-tag ${isActive ? 'active' : ''}`;
            tag.innerText = spec;
            tag.onclick = () => toggleSpec(spec, agentSpecs);
            grid.appendChild(tag);
        });
    }

    async function toggleSpec(spec, currentSpecs) {
        let nouvellesSpecs = [...currentSpecs];
        if (nouvellesSpecs.includes(spec)) {
            nouvellesSpecs = nouvellesSpecs.filter(s => s !== spec);
        } else {
            nouvellesSpecs.push(spec);
        }
        
        // Mise à jour immédiate dans Firebase
        try {
            await updateDoc(doc(db, "users", agentId), {
                specialites: nouvellesSpecs
            });
            genererSpecs(nouvellesSpecs); // Rafraîchir l'affichage
        } catch (e) {
            alert("Erreur de sauvegarde : " + e.message);
        }
    }

    chargerAgent();
  </script>
</body>
</html>
