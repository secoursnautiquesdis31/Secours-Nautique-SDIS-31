<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>Fiche Agent — SDIS 31</title>
    <link rel="stylesheet" href="../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B1F3A; --amber: #E8A020; --danger: #D94040; --green: #2A9D5C; }
        body { font-family: 'Barlow', sans-serif; background: #F4F6F8; margin: 0; padding: 20px; }
        .fiche-card { max-width: 900px; margin: 0 auto; background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
        .header { background: var(--navy); color: white; padding: 30px; position: relative; }
        .content { padding: 30px; }
        .section-title { border-bottom: 2px solid #EEE; padding: 15px 0; margin-bottom: 20px; color: var(--navy); text-transform: uppercase; display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .quota-container { background: #F0F4F8; padding: 20px; border-radius: 10px; margin-bottom: 30px; border-left: 5px solid var(--amber); }
        .quota-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 15px; }
        .quota-item { background: white; padding: 10px; border-radius: 6px; border: 1px solid #DDD; display: flex; justify-content: space-between; align-items: center; }
        .quota-item label { font-size: 0.8rem; font-weight: bold; color: #555; }
        .quota-item input { width: 45px; padding: 5px; text-align: center; border: 1px solid #CCC; border-radius: 4px; font-weight: bold; color: var(--navy); }
        .btn-save-quotas { width: 100%; margin-top: 15px; background: var(--navy); color: white; border: 2px solid var(--amber); padding: 10px; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s; }
        .btn-save-quotas:hover { background: var(--amber); color: var(--navy); }
        .spec-tag { padding: 8px 15px; border-radius: 20px; border: 2px solid #DDD; cursor: pointer; font-weight: bold; margin-right: 8px; color: #888; transition: 0.2s; }
        .spec-tag.active { border-color: var(--amber); background: var(--amber); color: var(--navy); }
        table { width: 100%; border-collapse: collapse; }
        th { background: #F8F9FA; color: var(--navy); text-align: left; padding: 12px; border-bottom: 2px solid #EEE; font-size: 0.85rem; }
        td { padding: 12px; border-bottom: 1px solid #F0F0F0; font-size: 0.95rem; }
        .epi-row { display: flex; justify-content: space-between; padding: 12px; border-bottom: 1px solid #F0F0F0; align-items: center; }
        .modal { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.6); }
        .modal-content { background: white; margin: 5% auto; padding: 25px; width: 500px; border-radius: 12px; max-height: 80vh; overflow-y: auto; }
        .stock-item { padding: 12px; border-bottom: 1px solid #EEE; cursor: pointer; display: flex; justify-content: space-between; }
        .stock-item:hover { background: #F0F4F8; color: var(--navy); }
    </style>
</head>
<body>

<a href="dashboard.html" style="position: fixed; top: 15px; left: 15px; z-index: 9999; background: #0B1F3A; color: white; padding: 10px 15px; border-radius: 8px; text-decoration: none; font-weight: bold; border: 2px solid #E8A020;">🏠 MENU</a>

<div class="fiche-card">
    <div class="header">
        <a href="rh.html" style="color:white; text-decoration:none; opacity:0.8;">← Retour à l'annuaire</a>
        <h1 id="nomAgent" style="margin: 20px 0 5px 0; text-transform: uppercase; letter-spacing: 1px;">CHARGEMENT...</h1>
        <div id="cisAgent" style="color: var(--amber); font-weight: bold; font-size: 1.1rem;">CIS ...</div>
    </div>

    <div class="content">
        <div class="section-title">Objectifs de Formation Individuels</div>
        <div class="quota-container">
            <div class="quota-grid">
                <div class="quota-item"><label>Recyclage SAV SEV</label><input type="number" id="q_sav" value="0"></div>
                <div class="quota-item"><label>FMPA Mer</label><input type="number" id="q_fmpa" value="0"></div>
                <div class="quota-item"><label>Recyclage CEN</label><input type="number" id="q_cen" value="0"></div>
                <div class="quota-item"><label>Entrainement / MSO</label><input type="number" id="q_mso" value="0"></div>
            </div>
            <button id="btnSaveQuotas" class="btn-save-quotas">💾 ENREGISTRER LES OBJECTIFS</button>
        </div>

        <div class="section-title">Spécialités Détachées</div>
        <div id="specsGrid" style="display: flex; flex-wrap: wrap; gap: 10px; margin-bottom: 30px;"></div>

        <div class="section-title">Historique des Présences</div>
        <div style="overflow-x: auto; margin-bottom: 30px;">
            <table>
                <thead><tr><th>Date</th><th>Désignation</th><th>Lieu</th></tr></thead>
                <tbody id="listeFormations"></tbody>
            </table>
        </div>

        <div class="section-title">
            <span>Paquetage Individuel (EPI)</span>
            <button id="btnOpenStock" style="background:var(--navy); color:white; border:1px solid var(--amber); padding:8px 15px; border-radius:6px; cursor:pointer; font-weight:bold;">+ Affecter Matériel</button>
        </div>
        <div id="epiList"></div>
    </div>
</div>

<div id="modalStock" class="modal">
    <div class="modal-content">
        <h2 style="color:var(--navy); border-bottom:2px solid var(--amber); padding-bottom:10px;">Stock Disponible</h2>
        <div id="listeChoixStock"></div>
        <button onclick="document.getElementById('modalStock').style.display='none'" style="margin-top:20px; width:100%; padding:12px; cursor:pointer; border-radius:6px; border:none; background:#DDD; font-weight:bold;">ANNULER</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getFirestore, doc, getDoc, getDocs, collection, updateDoc, arrayUnion, arrayRemove, increment } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
      authDomain: "secours-nautique-31.firebaseapp.com",
      projectId: "secours-nautique-31",
      storageBucket: "secours-nautique-31.firebasestorage.app",
      messagingSenderId: "1013387329575",
      appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    const params = new URLSearchParams(window.location.search);
    const agentId = params.get('id');
    const listeSpecs = ["CEN", "SAV-SEV", "SAL1", "SAL2", "SAL3"];

  async function charger() {
        if(!agentId) return;
        try {
            const snap = await getDoc(doc(db, "users", agentId));
            if (!snap.exists()) return;
            const agent = snap.data();
            const agentNom = agent.nom || "Inconnu";

            document.getElementById('nomAgent').innerText = agentNom;
            document.getElementById('cisAgent').innerText = agent.cis || "CIS NON RENSEIGNÉ";

            // 1. SPÉCIALITÉS
            const grid = document.getElementById('specsGrid');
            grid.innerHTML = "";
            const agentSpecs = agent.specialites || [];
            listeSpecs.forEach(s => {
                const active = agentSpecs.includes(s);
                const btn = document.createElement('div');
                btn.className = `spec-tag ${active ? 'active' : ''}`;
                btn.innerText = s;
                btn.onclick = () => toggleSpec(s, agentSpecs);
                grid.appendChild(btn);
            });

            // 2. EPI
            const epiList = document.getElementById('epiList');
            epiList.innerHTML = "";
            const agentEpi = agent.epi || [];
            if (agentEpi.length > 0) {
                agentEpi.forEach(item => {
                    const div = document.createElement('div');
                    div.className = "epi-row";
                    div.innerHTML = `<div><strong>${item.type}</strong> <small>${item.taille ? `(${item.taille})` : ''}</small></div>
                        <button style="color:var(--danger); border:none; background:none; cursor:pointer; font-weight:bold;" 
                        onclick="retirerEPI('${item.id}', '${item.type}', '${item.taille || ""}')">🗑️ RETIRER</button>`;
                    epiList.appendChild(div);
                });
            } else {
                epiList.innerHTML = "<p style='color:#999;'>Aucun EPI affecté.</p>";
            }

            // 3. CALCUL DES APTITUDES (BASÉ UNIQUEMENT SUR LES PRÉSENCES CALENDRIER)
            let compteurs = { sav: 0, fmpa: 0, cen: 0, mso: 0 };
            const histTbody = document.getElementById('listeFormations');
            histTbody.innerHTML = "";

            const fSnap = await getDocs(collection(db, "formations"));
            fSnap.forEach(fDoc => {
                const f = fDoc.data();
                const inscrits = f.inscrits || [];
                
                // On cherche si l'agent est marqué "présent"
                const presence = inscrits.find(i => i.nom === agentNom && i.statut === "présent");

                if (presence) {
                    // Ajout à l'historique
                    const dateFmt = f.date ? new Date(f.date).toLocaleDateString('fr-FR') : "---";
                    histTbody.innerHTML += `<tr><td>${dateFmt}</td><td>${f.nom}</td><td>${f.lieu || "---"}</td></tr>`;

                    // Incrémentation automatique des compteurs
                    const titre = f.nom.toUpperCase();
                    if (titre.includes("SAV") || titre.includes("SEV")) compteurs.sav++;
                    if (titre.includes("FMPA") || titre.includes("MER")) compteurs.fmpa++;
                    if (titre.includes("CEN")) compteurs.cen++;
                    if (titre.includes("MSO") || titre.includes("ENTRAINEMENT")) compteurs.mso++;
                }
            });

            // MISE À JOUR DU TABLEAU DES APTITUDES (En haut de la fiche)
            document.getElementById('q_sav').value = compteurs.sav;
            document.getElementById('q_fmpa').value = compteurs.fmpa;
            document.getElementById('q_cen').value = compteurs.cen;
            document.getElementById('q_mso').value = compteurs.mso;

        } catch (e) { console.error("Erreur chargement:", e); }
    }
    
    async function toggleSpec(spec, current) {
        const news = current.includes(spec) ? current.filter(s => s !== spec) : [...current, spec];
        await updateDoc(doc(db, "users", agentId), { specialites: news });
        charger();
    }

    document.getElementById('btnSaveQuotas').onclick = async () => {
        const nouveauxQuotas = {
            sav: parseInt(document.getElementById('q_sav').value),
            fmpa: parseInt(document.getElementById('q_fmpa').value),
            cen: parseInt(document.getElementById('q_cen').value),
            mso: parseInt(document.getElementById('q_mso').value)
        };
        await updateDoc(doc(db, "users", agentId), { quotas: nouveauxQuotas });
        alert("✅ Objectifs mis à jour !");
    };

    document.getElementById('btnOpenStock').onclick = async () => {
        document.getElementById('modalStock').style.display = 'block';
        const list = document.getElementById('listeChoixStock');
        list.innerHTML = "Chargement...";
        const snap = await getDocs(collection(db, "stocks"));
        list.innerHTML = "";
        snap.forEach(d => {
            const s = d.data();
            if(s.quantite > 0) {
                const div = document.createElement('div');
                div.className = "stock-item";
                div.innerHTML = `<span>${s.type} ${s.taille ? `(${s.taille})` : ''}</span> <strong>Dispo: ${s.quantite}</strong>`;
                div.onclick = async () => {
                    let objetAajouter = { id: d.id, type: s.type };
                    if(s.taille) objetAajouter.taille = s.taille;
                    await updateDoc(doc(db, "users", agentId), { epi: arrayUnion(objetAajouter) });
                    await updateDoc(doc(db, "stocks", d.id), { quantite: increment(-1) });
                    document.getElementById('modalStock').style.display = 'none';
                    charger();
                };
                list.appendChild(div);
            }
        });
    };

    window.retirerEPI = async (stockId, type, taille) => {
        if(confirm(`Supprimer l'affectation de ${type} ?`)) {
            const agentRef = doc(db, "users", agentId);
            const agentSnap = await getDoc(agentRef);
            const currentEpi = agentSnap.data().epi || [];
            const obj = currentEpi.find(item => item.id === stockId && item.type === type);
            if (obj) {
                await updateDoc(agentRef, { epi: arrayRemove(obj) });
                charger();
            }
        }
    };

    charger();
</script>
</body>
</html>
