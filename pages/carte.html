<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartographie — SDIS 31</title>
    <link rel="stylesheet" href="../main.css">
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #f0f2f5; }
        .map-container { width: 100%; height: 100vh; border: none; display: block; }
        
        /* BOUTON RETOUR : 3 fois plus petit et placé tout en haut à gauche */
        .btn-retour {
            position: fixed; 
            top: 5px; 
            left: 5px; 
            z-index: 1000;
            background: #0B1F3A; 
            color: white; 
            padding: 4px 8px; /* Taille réduite */
            text-decoration: none; 
            border-radius: 4px; 
            font-family: sans-serif;
            font-weight: bold; 
            font-size: 0.7rem; /* Texte plus petit */
            border: 1px solid #E8A020; /* Bordure plus fine */
            box-shadow: 0 2px 5px rgba(0,0,0,0.3);
            opacity: 0.9;
        }
        .btn-retour:hover { background: #E8A020; color: #0B1F3A; opacity: 1; }
    </style>
</head>
<body>

    <a href="javascript:history.back()" class="btn-retour">⬅ RETOUR</a>
    
    <iframe 
        src="https://www.google.com/maps/d/u/4/embed?mid=1vPIHdlVDNgMhICfhIWUqYS4Rqx7PQO0&ehbc=2E312F" 
        class="map-container">
    </iframe>

</body>
</html>
