<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ressources documentaires — SDIS 31</title>
    <link rel="stylesheet" href="../css/main.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --navy: #0B1F3A; --amber: #E8A020; --bg: #F0F2F5; --white: #ffffff; }
        body { font-family: 'Barlow', sans-serif; background: var(--bg); margin: 0; display: flex; height: 100vh; }

        /* Sidebar - Style Admin */
        .sidebar { width: 250px; background: var(--navy); color: white; display: flex; flex-direction: column; padding: 20px; border-right: 4px solid var(--amber); }
        .sidebar h2 { font-size: 1.2rem; text-align: center; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 15px; margin-bottom: 20px; }
        
        /* Bouton RETOUR style Admin */
        .btn-back { background: var(--amber); color: var(--navy); padding: 12px; border-radius: 8px; text-align: center; text-decoration: none; font-weight: bold; margin-top: auto; transition: 0.3s; border: none; cursor: pointer; }
        .btn-back:hover { background: #d38f1c; }

        /* Zone de contenu principale */
        .main-content { flex: 1; padding: 30px; overflow-y: auto; }
        .header-title { display: flex; justify-content: space-between; align-items: center; border-bottom: 3px solid var(--navy); padding-bottom: 10px; margin-bottom: 25px; }

        /* Grille des documents - Style Admin Dashboard */
        .doc-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 20px; }
        .doc-card { background: var(--white); border-radius: 12px; padding: 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-left: 6px solid var(--navy); transition: 0.3s; text-decoration: none; color: inherit; position: relative; }
        .doc-card:hover { transform: translateY(-5px); box-shadow: 0 8px 25px rgba(0,0,0,0.1); }
        .doc-card h3 { margin: 0 0 10px 0; color: var(--navy); font-size: 1.1rem; padding-right: 25px; }
        .doc-date { font-size: 0.85rem; color: #666; font-style: italic; }
        .btn-view { margin-top: 15px; display: inline-block; color: var(--amber); font-weight: bold; font-size: 0.9rem; }

        @media (max-width: 768px) {
            body { flex-direction: column; }
            .sidebar { width: 100%; height: auto; padding: 15px; border-right: none; border-bottom: 4px solid var(--amber); }
            .btn-back { margin-top: 10px; }
            .main-content { padding: 15px; }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>SÉCURITÉ NAUTIQUE</h2>
        <p style="text-align: center; opacity: 0.8; font-size: 0.85rem;">Consultation Opérationnelle</p>
        
        <a href="javascript:history.back()" class="btn-back">⬅️ RETOUR</a>
    </div>

    <div class="main-content">
        <div class="header-title">
            <h1 style="margin:0; color: var(--navy);">BIBLIOTHÈQUE OPS</h1>
            <div style="background: #e1f5fe; color: #0288d1; padding: 5px 15px; border-radius: 20px; font-size: 0.8rem; font-weight: bold;">MODE CONSULTATION</div>
        </div>

        <div id="gridDocs" class="doc-grid">
            <p>Chargement des fichiers en cours...</p>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getFirestore, collection, getDocs, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
            authDomain: "secours-nautique-31.firebaseapp.com",
            projectId: "secours-nautique-31",
            storageBucket: "secours-nautique-31.firebasestorage.app",
            messagingSenderId: "1013387329575",
            appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
        };

        const app = initializeApp(firebaseConfig);
        const db = getFirestore(app);

        async function chargerDocuments() {
            const grid = document.getElementById('gridDocs');
            try {
                // Requête de lecture simple (pas de modification possible)
                const q = query(collection(db, "bibliotheque_ops"), orderBy("date", "desc"));
                const snap = await getDocs(q);
                grid.innerHTML = "";

                if (snap.empty) {
                    grid.innerHTML = "<p style='grid-column: 1/-1; text-align: center;'>Aucun document n'a été publié pour le moment.</p>";
                    return;
                }

                snap.forEach(doc => {
                    const data = doc.data();
                    const dateAction = data.date ? new Date(data.date).toLocaleDateString('fr-FR') : "Date inconnue";
                    
                    // Création de la carte style Dashboard Admin
                    grid.innerHTML += `
                        <a href="${data.url}" target="_blank" class="doc-card">
                            <h3>${data.titre}</h3>
                            <div class="doc-date">Mise à jour le : ${dateAction}</div>
                            <div class="btn-view">OUVRIR LE PDF 📄</div>
                        </a>
                    `;
                });
            } catch (e) {
                console.error(e);
                grid.innerHTML = "<p>Erreur lors de la récupération des documents.</p>";
            }
        }

        chargerDocuments();
    </script>
</body>
</html>
