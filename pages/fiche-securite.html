<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiche SAL — SDIS 31</title>
  <link rel="stylesheet" href="../main.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --sdis-red: #d32f2f; --sdis-blue: #0B1F3A; }
    body { font-family: 'Barlow', sans-serif; background: #f4f7f6; padding: 15px; }
    .form-card { background: white; max-width: 1000px; margin: 0 auto; padding: 25px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h2 { color: var(--sdis-blue); border-bottom: 2px solid var(--sdis-red); padding-bottom: 8px; margin-top: 30px; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }
    .field { display: flex; flex-direction: column; margin-bottom: 10px; }
    label { font-weight: 600; font-size: 0.85em; margin-bottom: 5px; color: #555; }
    input, select { padding: 10px; border: 1px solid #ccc; border-radius: 6px; font-size: 0.95em; }
    table { width: 100%; border-collapse: collapse; margin-top: 15px; min-width: 600px; }
    th { background: #eee; padding: 10px; border: 1px solid #ddd; font-size: 0.8em; }
    td { border: 1px solid #ddd; padding: 5px; }
    td input, td select { width: 100%; border: none; background: transparent; padding: 8px; box-sizing: border-box; }
    .btn-submit { background: var(--sdis-red); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; margin-top: 30px; font-size: 1.1em; }
    #status { text-align: center; margin-top: 15px; font-weight: bold; padding: 10px; border-radius: 5px; }
  </style>
</head>
<body>

<div class="form-card">
  <a href="dashboard.html" style="color: var(--sdis-red); text-decoration: none; font-weight: bold;">← Retour</a>
  <h1 style="text-align:center; color: var(--sdis-blue);">Fiche de Sécurité SAL</h1>

  <form id="salForm">
    <h2>1. Organisation</h2>
    <div class="grid">
      <div class="field"><label>N° SAL</label><input type="text" id="num_sal" required></div>
      <div class="field"><label>Date</label><input type="date" id="date_op" required></div>
      <div class="field"><label>Site</label><input type="text" id="site" required></div>
      <div class="field">
        <label>Altitude</label>
        <select id="altitude">
          <option>0 - 300 mètres</option>
          <option>300 - 500 mètres</option>
          <option>> 700 mètres</option>
        </select>
      </div>
    </div>

    <h2>2. Conditions</h2>
    <div class="grid">
      <div class="field"><label>Courant</label><select id="courant"><option>Nul</option><option>Faible</option><option>Moyen</option><option>Fort</option></select></div>
      <div class="field"><label>Visibilité</label><select id="visibilite"><option>Bonne</option><option>Moyenne</option><option>Nulle</option></select></div>
      <div class="field"><label>T° Eau (°C)</label><input type="number" id="temp_eau"></div>
      <div class="field"><label>Prof. Prévue (m)</label><input type="number" id="prof_prevue"></div>
    </div>

    <h2>3. Encadrement</h2>
    <div class="grid">
      <div class="field"><label>Directeur de Plongée (DP)</label><input type="text" id="dp" required></div>
      <div class="field"><label>Chef de Bord</label><input type="text" id="chef_bord"></div>
      <div class="field"><label>Sécu Surface</label><input type="text" id="secu_surface"></div>
    </div>

    <h2>4. La Bordée</h2>
    <div style="overflow-x: auto;">
      <table id="plongeursTable">
        <thead>
          <tr>
            <th>Nom / Prénom</th>
            <th>Départ</th>
            <th>P. Dép</th>
            <th>Retour</th>
            <th>P. Fin</th>
          </tr>
        </thead>
        <tbody>
          <!-- Les 6 lignes générées -->
          <script>
            for(let i=0; i<6; i++) {
              document.write(`
                <tr>
                  <td><select class="p_nom"><option value="">-- Agent --</option></select></td>
                  <td><input type="time" class="p_h_dep"></td>
                  <td><input type="number" class="p_p_dep"></td>
                  <td><input type="time" class="p_h_ret"></td>
                  <td><input type="number" class="p_p_ret"></td>
                </tr>
              `);
            }
          </script>
        </tbody>
      </table>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">GÉNÉRER LA FICHE DANS SHEETS</button>
  </form>
  <div id="status"></div>
</div>

<script>
  // COLLER VOTRE URL /EXEC ICI
  const SCRIPT_URL = "VOTRE_URL_APPS_SCRIPT_ICI";

  // CHARGEMENT AUTOMATIQUE DES NOMS
  window.onload = async function() {
    try {
      const response = await fetch(SCRIPT_URL);
      const agents = await response.json();
      const selects = document.querySelectorAll('.p_nom');
      selects.forEach(select => {
        agents.forEach(agent => {
          let opt = document.createElement('option');
          opt.value = agent; opt.text = agent;
          select.appendChild(opt);
        });
      });
    } catch (e) { console.log("Erreur chargement noms"); }
  };

  // ENVOI DU FORMULAIRE
  document.getElementById('salForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    btn.disabled = true;
    status.innerText = "⏳ Envoi en cours...";

    const plongeurs = [];
    document.querySelectorAll('#plongeursTable tbody tr').forEach(row => {
      const nom = row.querySelector('.p_nom').value;
      if(nom) {
        plongeurs.push({
          nom: nom,
          h_dep: row.querySelector('.p_h_dep').value,
          p_dep: row.querySelector('.p_p_dep').value,
          h_ret: row.querySelector('.p_h_ret').value,
          p_ret: row.querySelector('.p_p_ret').value
        });
      }
    });

    const payload = {
      num_sal: document.getElementById('num_sal').value,
      date: document.getElementById('date_op').value,
      site: document.getElementById('site').value,
      altitude: document.getElementById('altitude').value,
      courant: document.getElementById('courant').value,
      visibilite: document.getElementById('visibilite').value,
      temp_eau: document.getElementById('temp_eau').value,
      prof_prevue: document.getElementById('prof_prevue').value,
      dp: document.getElementById('dp').value,
      chef_bord: document.getElementById('chef_bord').value,
      secu_surface: document.getElementById('secu_surface').value,
      plongeurs: plongeurs
    };

    try {
      await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
      status.style.color = "green";
      status.innerText = "✅ Fiche créée !";
      document.getElementById('salForm').reset();
    } catch (err) {
      status.style.color = "red";
      status.innerText = "❌ Erreur d'envoi.";
    } finally { btn.disabled = false; }
  });
</script>
</body>
</html>
