<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <title>Fiche SAL - Paramètres complets</title>
  <style>
    body { font-family: sans-serif; font-size: 11px; background: #f0f0f0; }
    .container { background: white; padding: 20px; max-width: 1200px; margin: auto; }
    table { width: 100%; border-collapse: collapse; margin-bottom: 20px; }
    th { background: #eee; border: 1px solid #000; padding: 5px; text-align: center; }
    td { border: 1px solid #000; padding: 2px; }
    .palanquee-cell { font-weight: bold; text-align: center; font-size: 1.5em; background: #fafafa; }
    input, select { width: 100%; border: none; padding: 5px; box-sizing: border-box; font-size: 11px; }
    .header-info { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
    .btn { background: #d32f2f; color: white; padding: 15px; border: none; width: 100%; cursor: pointer; font-weight: bold; }
  </style>
</head>
<body>

<div class="container">
  <h2 style="text-align:center">PARAMETRES DE PLONGEE</h2>
  
  <div class="header-info">
    <div><label>N° SAL</label><input type="text" id="num_sal" required></div>
    <div><label>Site</label><input type="text" id="site" required></div>
    <div><label>Date</label><input type="date" id="date" required></div>
  </div>

  <form id="salForm">
    <table>
      <thead>
        <tr>
          <th>Palanquée</th>
          <th>Niveau</th>
          <th>Nom / Prénom</th>
          <th>P. Entrée</th>
          <th>Immersion</th>
          <th>HS Para</th>
          <th>Sortie</th>
          <th>3m</th>
          <th>6m</th>
          <th>6m O2</th>
          <th>9m</th>
          <th>Prof.</th>
          <th>P. Sortie</th>
        </tr>
      </thead>
      <tbody id="tableBody">
        <!-- Généré par JS -->
      </tbody>
    </table>
    <button type="submit" class="btn">GÉNÉRER LA FICHE DANS GOOGLE SHEETS</button>
  </form>
</div>

<script>
  const SCRIPT_URL = "VOTRE_URL_EXEC";
  let agentsData = [];

  // Générer les 6 palanquées (A à F) de 4 plongeurs
  const letters = ['A', 'B', 'C', 'D', 'E', 'F'];
  const tbody = document.getElementById('tableBody');

  letters.forEach(letter => {
    for (let i = 0; i < 4; i++) {
      const tr = document.createElement('tr');
      tr.className = "row-plongeur";
      
      // Cellule Palanquée (fusion visuelle pour le 1er de chaque groupe)
      let palCell = (i === 0) ? `<td rowspan="4" class="palanquee-cell">${letter}</td>` : "";
      
      tr.innerHTML = `
        ${palCell}
        <td><input type="text" class="p_niveau" readonly></td>
        <td><select class="p_nom" onchange="updateNiveau(this)"><option value="">-- Agent --</option></select></td>
        <td><input type="number" class="p_entree"></td>
        <td><input type="time" class="p_h_imm"></td>
        <td><input type="time" class="p_h_para"></td>
        <td><input type="time" class="p_h_sortie"></td>
        <td><input type="number" class="p_3m"></td>
        <td><input type="number" class="p_6m"></td>
        <td><input type="number" class="p_6mO2"></td>
        <td><input type="number" class="p_9m"></td>
        <td><input type="number" class="p_prof"></td>
        <td><input type="number" class="p_sortie"></td>
      `;
      tbody.appendChild(tr);
    }
  });

  // Charger les agents et leurs niveaux
  window.onload = async () => {
    const res = await fetch(SCRIPT_URL);
    agentsData = await res.json();
    const selects = document.querySelectorAll('.p_nom');
    selects.forEach(s => {
      agentsData.forEach(a => {
        let opt = document.createElement('option');
        opt.value = a.nom; opt.text = a.nom;
        s.appendChild(opt);
      });
    });
  };

  // Met à jour le niveau automatiquement quand on choisit un nom
  function updateNiveau(selectElt) {
    const row = selectElt.closest('tr');
    const agent = agentsData.find(a => a.nom === selectElt.value);
    row.querySelector('.p_niveau').value = agent ? agent.niveau : "";
  }

  document.getElementById('salForm').onsubmit = async (e) => {
    e.preventDefault();
    const plongeurs = [];
    document.querySelectorAll('.row-plongeur').forEach(row => {
      const nom = row.querySelector('.p_nom').value;
      if (nom) {
        plongeurs.push({
          nom: nom,
          niveau: row.querySelector('.p_niveau').value,
          p_entree: row.querySelector('.p_entree').value,
          h_immersion: row.querySelector('.p_h_imm').value,
          h_parachute: row.querySelector('.p_h_para').value,
          h_sortie: row.querySelector('.p_h_sortie').value,
          p3m: row.querySelector('.p_3m').value,
          p6m: row.querySelector('.p_6m').value,
          p6mO2: row.querySelector('.p_6mO2').value,
          p9m: row.querySelector('.p_9m').value,
          prof: row.querySelector('.p_prof').value,
          p_sortie: row.querySelector('.p_sortie').value
        });
      }
    });

    const payload = {
      num_sal: document.getElementById('num_sal').value,
      site: document.getElementById('site').value,
      date: document.getElementById('date').value,
      plongeurs: plongeurs
    };

    await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
    alert("Fiche envoyée !");
  };
</script>
</body>
</html>
