<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiche de Sécurité SAL — SDIS 31</title>
  <link rel="stylesheet" href="../main.css">

  <style>
    .form-container { background: white; padding: 30px; border-radius: 12px; shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 800px; margin: 20px auto; }
    .form-group { margin-bottom: 15px; display: flex; flex-direction: column; }
    .form-row { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
    label { font-weight: 600; margin-bottom: 5px; color: #0B1F3A; }
    input, select { padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-family: 'Barlow', sans-serif; }
    .btn-submit { background-color: #d32f2f; color: white; border: none; padding: 15px; border-radius: 5px; cursor: pointer; font-weight: bold; margin-top: 20px; }
    .btn-submit:disabled { background-color: #ccc; }
    #status { margin-top: 15px; font-weight: 500; text-align: center; }
  </style>
</head>
<body class="app-layout">

  <main class="main-content">
    <a href="dashboard.html" style="text-decoration: none; color: #d32f2f;">← Retour au tableau de bord</a>
    <h1>Création d'une Fiche de Sécurité</h1>

    <div class="form-container">
      <form id="ficheForm">
        <div class="form-row">
          <div class="form-group">
            <label>N° SAL</label>
            <input type="text" id="num_sal" placeholder="Ex: 2024-001">
          </div>
          <div class="form-group">
            <label>Date de l'opération</label>
            <input type="date" id="date_op" required>
          </div>
        </div>

        <div class="form-group">
          <label>Site de plongée</label>
          <input type="text" id="site" placeholder="Nom du plan d'eau / rivière" required>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label>Point GPS</label>
            <input type="text" id="gps" placeholder="43.XXXX, 1.XXXX">
          </div>
          <div class="form-group">
            <label>Altitude</label>
            <select id="altitude">
              <option value="0 - 300 mètres">0 - 300 mètres</option>
              <option value="300 - 500 mètres">300 - 500 mètres</option>
              <option value="> 700 mètres">> 700 mètres</option>
            </select>
          </div>
        </div>

        <div class="form-group">
          <label>Directeur de Plongée (DP)</label>
          <input type="text" id="dp" placeholder="Nom et Prénom" required>
        </div>

        <button type="submit" class="btn-submit" id="submitBtn">GÉNÉRER LA FICHE DANS LE SHEETS</button>
      </form>
      <div id="status"></div>
    </div>
  </main>
