<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Fiche de Sécurité SAL — SDIS 31</title>
  <link rel="stylesheet" href="../main.css">
  <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;600&display=swap" rel="stylesheet">
  <style>
    :root { --sdis-red: #d32f2f; --sdis-blue: #0B1F3A; }
    body { font-family: 'Barlow', sans-serif; background: #f4f7f6; padding: 20px; color: #333; }
    .form-card { background: white; max-width: 1000px; margin: 0 auto; padding: 30px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); }
    h1 { text-align: center; color: var(--sdis-blue); text-transform: uppercase; margin-bottom: 30px; }
    h2 { color: var(--sdis-blue); border-bottom: 2px solid var(--sdis-red); padding-bottom: 8px; margin-top: 40px; font-size: 1.4em; }
    .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 20px; margin-bottom: 20px; }
    .field { display: flex; flex-direction: column; }
    label { font-weight: 600; font-size: 0.9em; margin-bottom: 8px; color: #555; }
    input, select { padding: 12px; border: 1px solid #ccc; border-radius: 6px; font-size: 1em; outline: none; }
    input:focus { border-color: var(--sdis-red); }
    
    /* Style du Tableau */
    .table-container { overflow-x: auto; margin-top: 15px; }
    table { width: 100%; border-collapse: collapse; min-width: 600px; }
    th { background: #f8f9fa; padding: 12px; border: 1px solid #ddd; text-align: left; font-size: 0.9em; }
    td { padding: 8px; border: 1px solid #ddd; }
    td input { width: 100%; border: none; padding: 8px; box-sizing: border-box; background: transparent; }

    .btn-submit { background: var(--sdis-red); color: white; border: none; padding: 18px; width: 100%; border-radius: 8px; font-weight: bold; cursor: pointer; font-size: 1.1em; margin-top: 40px; transition: 0.3s; }
    .btn-submit:hover { background: #b71c1c; transform: translateY(-2px); }
    .btn-submit:disabled { background: #ccc; cursor: not-allowed; }
    #status { text-align: center; margin-top: 20px; font-weight: bold; padding: 15px; border-radius: 6px; }
  </style>
</head>
<body>

<div class="form-card">
  <a href="dashboard.html" style="color: var(--sdis-red); text-decoration: none; font-weight: bold;">← Retour au tableau de bord</a>
  <h1>Fiche de Sécurité SAL</h1>

  <form id="salForm">
    <!-- SECTION 1 : ORGANISATION -->
    <h2>1. Organisation</h2>
    <div class="grid">
      <div class="field"><label>N° SAL</label><input type="text" id="num_sal" placeholder="Ex: 2026-04" required></div>
      <div class="field"><label>Date</label><input type="date" id="date_op" required></div>
      <div class="field"><label>Site</label><input type="text" id="site" placeholder="Lieu de l'immersion" required></div>
      <div class="field">
        <label>Altitude</label>
        <select id="altitude">
          <option>0 - 300 mètres</option>
          <option>300 - 500 mètres</option>
          <option>> 700 mètres</option>
        </select>
      </div>
    </div>

    <!-- SECTION 2 : CONDITIONS & PLANIFICATION -->
    <h2>2. Conditions & Planification</h2>
    <div class="grid">
      <div class="field">
        <label>Courant</label>
        <select id="courant"><option>Nul</option><option>Faible</option><option>Moyen</option><option>Fort</option></select>
      </div>
      <div class="field">
        <label>Visibilité</label>
        <select id="visibilite"><option>Bonne</option><option>Moyenne</option><option>Faible</option><option>Nulle</option></select>
      </div>
      <div class="field"><label>T° Eau (°C)</label><input type="number" id="temp_eau" placeholder="ex: 14"></div>
      <div class="field"><label>Prof. Prévue (m)</label><input type="number" id="prof_prevue" placeholder="ex: 25"></div>
    </div>

    <!-- SECTION 3 : ENCADREMENT -->
    <h2>3. Encadrement</h2>
    <div class="grid">
      <div class="field"><label>Directeur de Plongée (DP)</label><input type="text" id="dp" required></div>
      <div class="field"><label>Chef de Bord</label><input type="text" id="chef_bord"></div>
      <div class="field"><label>Sécu Surface</label><input type="text" id="secu_surface"></div>
    </div>

    <!-- SECTION 4 : LA BORDÉE (PLONGEURS) -->
    <h2>4. Paramètres des Plongeurs</h2>
    <div class="table-container">
      <table id="plongeursTable">
        <thead>
          <tr>
            <th>Nom / Prénom</th>
            <th>Départ (h)</th>
            <th>P. Dép (bar)</th>
            <th>Retour (h)</th>
            <th>P. Fin (bar)</th>
          </tr>
        </thead>
        <tbody>
          <!-- On génère 6 lignes vides par défaut -->
          <script>
            for(let i=0; i<6; i++) {
              document.write(`
                <tr>
                  <td><input type="text" class="p_nom"></td>
                  <td><input type="time" class="p_h_dep"></td>
                  <td><input type="number" class="p_p_dep"></td>
                  <td><input type="time" class="p_h_ret"></td>
                  <td><input type="number" class="p_p_ret"></td>
                </tr>
              `);
            }
          </script>
        </tbody>
      </table>
    </div>

    <button type="submit" class="btn-submit" id="submitBtn">GÉNÉRER LA FICHE DANS GOOGLE SHEETS</button>
  </form>
  <div id="status"></div>
</div>

<script>
  // COLLER VOTRE URL /EXEC CI-DESSOUS
  const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbzrqWw3sc1VI4f7DI_HWNrX0p4Z6FMshyeC73GmXz_mnct6zIxRvJnmcPuvkPr7hUDmtw/exec";

  document.getElementById('salForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('submitBtn');
    const status = document.getElementById('status');
    
    btn.disabled = true;
    status.style.background = "#e3f2fd";
    status.innerText = "⏳ Transmission des données au tableur...";

    // Récupération des plongeurs
    const rows = document.querySelectorAll('#plongeursTable tbody tr');
    const plongeursData = [];
    rows.forEach(row => {
      const nom = row.querySelector('.p_nom').value;
      if(nom) {
        plongeursData.push({
          nom: nom,
          h_dep: row.querySelector('.p_h_dep').value,
          p_dep: row.querySelector('.p_p_dep').value,
          h_ret: row.querySelector('.p_h_ret').value,
          p_ret: row.querySelector('.p_p_ret').value
        });
      }
    });

    const payload = {
      num_sal: document.getElementById('num_sal').value,
      date: document.getElementById('date_op').value,
      site: document.getElementById('site').value,
      altitude: document.getElementById('altitude').value,
      courant: document.getElementById('courant').value,
      visibilite: document.getElementById('visibilite').value,
      temp_eau: document.getElementById('temp_eau').value,
      prof_prevue: document.getElementById('prof_prevue').value,
      dp: document.getElementById('dp').value,
      chef_bord: document.getElementById('chef_bord').value,
      secu_surface: document.getElementById('secu_surface').value,
      plongeurs: plongeursData
    };

    try {
      await fetch(SCRIPT_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(payload) });
      status.style.background = "#e8f5e9";
      status.style.color = "#2e7d32";
      status.innerHTML = "✅ <b>Succès !</b> La fiche a été créée avec les paramètres de la bordée.";
      document.getElementById('salForm').reset();
    } catch (err) {
      status.style.background = "#ffebee";
      status.style.color = "#c62828";
      status.innerText = "❌ Erreur de connexion au serveur Google.";
    } finally {
      btn.disabled = false;
    }
  });
</script>

</body>
</html>
