<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secours Nautique 31 - Accueil</title>
    <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@600&family=Barlow:wght@400&display=swap" rel="stylesheet">
    <style>
        /* Configuration du fond d'écran */
        body, html {
            height: 100%;
            margin: 0;
            font-family: 'Barlow', sans-serif;
            overflow: hidden; /* Empêche le défilement si le fond est fixe */
        }

        .bg-image {
            /* Chemin vers ton image enregistrée localement */
            background-image: url('fond-page.png'); 
            
            /* Paramètres pour un fond d'écran complet et centré */
            background-position: center;
            background-repeat: no-repeat;
            background-size: cover; /* L'image s'adapte à la taille de l'écran */
            height: 100%;
            width: 100%;
            display: flex;
            justify-content: center;
            align-items: flex-end; /* Aligne le contenu (boutons) en bas */
            padding-bottom: 50px; /* Espace depuis le bas de l'écran */
        }

        /* Conteneur des boutons */
        .buttons-container {
            display: flex;
            flex-direction: column; /* Boutons l'un au-dessus de l'autre sur mobile */
            gap: 20px;
            width: 90%;
            max-width: 500px; /* Largeur maximale pour ne pas être trop larges */
            text-align: center;
        }

        /* Style commun pour les deux boutons */
        .btn {
            display: block;
            padding: 15px 20px;
            border-radius: 8px;
            font-family: 'Barlow Condensed', sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
            cursor: pointer;
            border: 2px solid transparent;
        }

        /* Style spécifique : Accès Administrateur */
        .btn-admin {
            background-color: #E8A020; /* Jaune orangé de l'emblème */
            color: #1a1a1a;
        }

        .btn-admin:hover {
            background-color: #f7b23b;
            transform: translateY(-2px);
        }

        /* Style spécifique : Accès Spécialiste */
        .btn-specialist {
            background-color: transparent;
            color: #E8A020;
            border-color: #E8A020;
        }

        .btn-specialist:hover {
            background-color: rgba(232, 160, 32, 0.1);
            transform: translateY(-2px);
        }

        /* Responsive : passer les boutons côte à côte sur tablette/PC */
        @media (min-width: 600px) {
            .buttons-container {
                flex-direction: row; /* Boutons l'un à côté de l'autre */
                justify-content: center;
            }
            .btn {
                flex: 1; /* Les boutons prennent la même largeur */
            }
        }
    </style>
</head>
<body>

    <div class="bg-image">
        <div class="buttons-container">
            <a href="pages/admin-login.html" class="btn btn-admin">Accès Administrateur</a>
            <a href="https://secoursnautiquesdis31.github.io/Secours-Nautique-SDIS-31/pages/espace-public.html" class="btn btn-specialist">Accès Spécialiste</a>
        </div>
    </div>

</body>
</html>
