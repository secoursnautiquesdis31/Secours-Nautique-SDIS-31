<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDIS 31 — Secours Nautique</title>
  <link rel="stylesheet" href="main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    body, html {
      height: 100%;
      margin: 0;
      background-color: #0d1b2a;
      font-family: 'Barlow', sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* ZONE DU LOGO (CENTRE) */
    .logo-main-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .logo-img {
      max-width: 80%;
      max-height: 60vh;
      height: auto;
      object-fit: contain;
    }

    /* ZONE DES BOUTONS (BAS) */
    .bottom-interface {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      padding-bottom: 40px;
      text-align: center;
    }

    .choice-buttons {
      display: flex;
      gap: 15px;
      padding: 0 20px;
    }

    .btn-choice {
      flex: 1;
      padding: 15px;
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      transition: 0.3s;
      font-size: 1em;
      border: 2px solid #E8A020;
    }

    .btn-admin { background: #E8A020; color: #1a1a1a; }
    .btn-spec { background: transparent; color: #E8A020; }

    /* BOITE DE CONNEXION : MODALE AU CENTRE */
    #loginBox {
      display: none; /* Caché par défaut */
      position: fixed; /* Sort du flux pour être au-dessus */
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%); /* Centrage parfait */
      background: rgba(255, 255, 255, 0.98);
      padding: 30px;
      border-radius: 12px;
      width: 90%;
      max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.8);
      z-index: 1000; /* Devant tout le reste */
    }

    /* Overlay : assombrit le fond quand la boîte est ouverte */
    #overlay {
      display: none;
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.7);
      backdrop-filter: blur(4px); /* Floute légèrement le logo derrière */
      z-index: 999;
    }

    .back-btn {
      display: inline-block;
      margin-top: 15px;
      color: #666;
      font-size: 0.9em;
      cursor: pointer;
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <div id="overlay" onclick="hideLogin()"></div>

  <div class="logo-main-container">
    <img src="Logo Secours Nautique.JPG" alt="Logo Secours Nautique" class="logo-img">
  </div>

  <div class="bottom-interface">
    <div id="choiceScreen" class="choice-buttons">
      <button onclick="showLogin()" class="btn-choice btn-admin">Accès Administrateur</button>
      <a href="https://secoursnautiquesdis31.github.io/Secours-Nautique-SDIS-31/pages/espace-public.html" class="btn-choice btn-spec">Accès Spécialiste</a>
    </div>
  </div>

  <div id="loginBox">
    <h2 style="color: #333; margin-top: 0; font-family: 'Barlow Condensed'; text-align: center;">Connexion Admin</h2>
    <form id="loginForm" style="text-align: left;">
      <div style="margin-bottom: 15px;">
        <label for="email" style="color:#333; display: block; font-weight: 500;">Email</label>
        <input type="email" id="email" style="width:100%; padding:12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-top: 5px;" placeholder="prenom.nom@sdis31.fr" required>
      </div>
      <div style="margin-bottom: 20px;">
        <label for="password" style="color:#333; display: block; font-weight: 500;">Mot de passe</label>
        <input type="password" id="password" style="width:100%; padding:12px; border: 1px solid #ccc; border-radius: 6px; box-sizing: border-box; margin-top: 5px;" placeholder="••••••••" required>
      </div>
      <div id="loginError" style="display:none; color: #d9534f; margin-bottom: 15px; font-size: 0.9em; font-weight: bold;"></div>
      <button type="submit" style="width:100%; background:#E8A020; color: #1a1a1a; border:none; padding:14px; font-weight:bold; cursor:pointer; border-radius: 6px; font-family: 'Barlow Condensed'; font-size: 1.1em; text-transform: uppercase;">Se connecter</button>
    </form>
    <div style="text-align: center;">
      <span class="back-btn" onclick="hideLogin()">Annuler et retourner à l'accueil</span>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
        authDomain: "secours-nautique-31.firebaseapp.com",
        projectId: "secours-nautique-31",
        storageBucket: "secours-nautique-31.firebasestorage.app",
        messagingSenderId: "1013387329575",
        appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Fonctions d'affichage modifiées
    window.showLogin = () => {
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
    };
    
    window.hideLogin = () => {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
    };

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errDiv = document.getElementById("loginError");
        errDiv.style.display = "none";
        const email = document.getElementById("email").value.trim();
        const pass = document.getElementById("password").value;

        try {
            await signInWithEmailAndPassword(auth, email, pass);
            window.location.href = "pages/dashboard.html";
        } catch (err) {
            errDiv.style.display = "block";
            errDiv.textContent = "Identifiants incorrects.";
        }
    });
  </script>
</body>
</html>
