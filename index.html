<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SDIS 31 - Connexion</title>
    <link rel="stylesheet" href="main.css">
    <link href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;700&display=swap" rel="stylesheet">
</head>
<body class="login-page">

    <div class="login-container">
        <div class="login-card">
            <h2>SDIS 31</h2>
            <h3>Secours Nautique</h3>
            <form id="loginForm">
                <div class="form-group">
                    <label>Email professionnel</label>
                    <input type="email" id="email" placeholder="prenom.nom@sdis31.fr" required>
                </div>
                <div class="form-group">
                    <label>Mot de passe</label>
                    <input type="password" id="password" placeholder="••••••••" required>
                </div>
                <button type="submit">Connexion</button>
                <p id="loginError" style="color: #ff4d4d; display: none; margin-top: 10px; font-weight: bold;"></p>
            </form>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
            authDomain: "secours-nautique-31.firebaseapp.com",
            projectId: "secours-nautique-31",
            storageBucket: "secours-nautique-31.firebasestorage.app",
            messagingSenderId: "1013387329575",
            appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        document.getElementById("loginForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            const errDiv = document.getElementById("loginError");
            errDiv.style.display = "none";

            const email = document.getElementById("email").value.trim();
            const pass = document.getElementById("password").value;

            try {
                await signInWithEmailAndPassword(auth, email, pass);
                window.location.href = "pages/dashboard.html";
            } catch (err) {
                errDiv.style.display = "block";
                errDiv.textContent = "Erreur : Identifiants incorrects ou problème réseau.";
            }
        });
    </script>
</body>
</html>
