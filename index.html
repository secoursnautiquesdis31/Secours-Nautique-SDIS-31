<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SDIS 31 — Secours Nautique</title>
  <link rel="stylesheet" href="main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Barlow+Condensed:wght@400;600;700&family=Barlow:wght@300;400;500&display=swap" rel="stylesheet">
  <style>
    /* On force le fond sombre sur l'index malgré le main.css */
    body, html {
      height: 100% !important;
      margin: 0;
      background-color: #0d1b2a !important; 
      font-family: 'Barlow', sans-serif;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    .logo-main-container {
      flex: 1;
      display: flex;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }

    .logo-img {
      max-width: 80%;
      max-height: 55vh;
      height: auto;
      object-fit: contain;
    }

    .bottom-interface {
      width: 100%;
      max-width: 500px;
      margin: 0 auto;
      padding-bottom: 40px;
      text-align: center;
    }

    .choice-buttons {
      display: flex;
      gap: 15px;
      padding: 0 20px;
    }

    .btn-choice {
      flex: 1;
      padding: 15px;
      border-radius: 8px;
      font-family: 'Barlow Condensed', sans-serif;
      font-weight: 600;
      text-transform: uppercase;
      cursor: pointer;
      border: 2px solid #E8A020;
      font-size: 1em;
      transition: 0.3s;
    }

    .btn-admin { background: #E8A020; color: #1a1a1a; }
    .btn-spec { background: transparent; color: #E8A020; text-decoration: none; display: flex; align-items: center; justify-content: center;}

    /* --- LA BOITE MODALE AU CENTRE --- */
    #overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.85);
      z-index: 9998;
      backdrop-filter: blur(5px);
    }

    #loginBox {
      display: none;
      position: fixed !important;
      top: 50% !important;
      left: 50% !important;
      transform: translate(-50%, -50%) !important;
      background: white !important; /* Fond blanc pour la lisibilité */
      padding: 35px;
      border-radius: 15px;
      width: 90%;
      max-width: 380px;
      box-shadow: 0 25px 50px rgba(0,0,0,0.5);
      z-index: 9999 !important;
    }

    /* Correction pour les labels qui héritent du blanc de main.css */
    #loginBox label {
      color: #333 !important; 
      display: block;
      margin-bottom: 5px;
      font-weight: 600;
    }

    #loginBox input {
      width: 100%;
      padding: 12px;
      border: 1px solid #ccc !important;
      border-radius: 6px;
      box-sizing: border-box;
      background: #f9f9f9;
      color: #333 !important;
    }

    .back-btn {
      display: block;
      margin-top: 20px;
      color: #888;
      cursor: pointer;
      text-decoration: underline;
      font-size: 0.9em;
    }
  </style>
</head>
<body>

  <div id="overlay" onclick="hideLogin()"></div>

  <div class="logo-main-container">
    <img src="Logo Secours Nautique.JPG" alt="Logo" class="logo-img">
  </div>

  <div class="bottom-interface">
    <div id="choiceScreen" class="choice-buttons">
      <button onclick="showLogin()" class="btn-choice btn-admin">Accès Administrateur</button>
      <a href="https://secoursnautiquesdis31.github.io/Secours-Nautique-SDIS-31/pages/espace-public.html" class="btn-choice btn-spec">Accès Spécialiste</a>
    </div>
  </div>

  <div id="loginBox">
    <h2 style="color: #0B1F3A; margin: 0 0 25px 0; text-align: center; font-family: 'Barlow Condensed'; font-size: 1.8em;">CONNEXION</h2>
    
    <form id="loginForm">
      <div style="margin-bottom: 15px;">
        <label>Email Professionnel</label>
        <input type="email" id="email" placeholder="prenom.nom@sdis31.fr" required>
      </div>
      <div style="margin-bottom: 25px;">
        <label>Mot de passe</label>
        <input type="password" id="password" placeholder="••••••••" required>
      </div>
      
      <div id="loginError" style="color: #D94040; display: none; margin-bottom: 15px; font-weight: bold; text-align: center;"></div>
      
      <button type="submit" style="width:100%; background: #E8A020; color: #0B1F3A; border: none; padding: 15px; font-weight: 700; border-radius: 8px; cursor: pointer; text-transform: uppercase; font-family: 'Barlow Condensed'; font-size: 1.1em;">Se connecter</button>
    </form>
    
    <div style="text-align: center;">
      <span class="back-btn" onclick="hideLogin()">Retour à l'accueil</span>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDALxymVqh-WmY6VARc-m6zOzyt5zFk66o",
        authDomain: "secours-nautique-31.firebaseapp.com",
        projectId: "secours-nautique-31",
        storageBucket: "secours-nautique-31.firebasestorage.app",
        messagingSenderId: "1013387329575",
        appId: "1:1013387329575:web:aa1148aedf7e3106bb4e02"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    window.showLogin = () => {
      document.getElementById('loginBox').style.display = 'block';
      document.getElementById('overlay').style.display = 'block';
    };
    
    window.hideLogin = () => {
      document.getElementById('loginBox').style.display = 'none';
      document.getElementById('overlay').style.display = 'none';
    };

    document.getElementById("loginForm").addEventListener("submit", async (e) => {
        e.preventDefault();
        const errDiv = document.getElementById("loginError");
        errDiv.style.display = "none";
        
        try {
            await signInWithEmailAndPassword(auth, document.getElementById("email").value, document.getElementById("password").value);
            window.location.href = "pages/dashboard.html";
        } catch (err) {
            errDiv.style.display = "block";
            errDiv.textContent = "Identifiants incorrects";
        }
    });
  </script>
</body>
</html>
